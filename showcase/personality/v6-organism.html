<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>organism</title>
<style>
  :root{ --bg:#b9b7b1; --ink:#1a1a13; --dim:#67665f; --line:#9b998f; --paper:#dad8d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--dim);
    font:12px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4vmin; }
  .stage{ position:relative; width:min(92vmin,860px); aspect-ratio:1/1; background:var(--paper);
    border:1px solid var(--line); overflow:hidden; }
  .tag{ position:fixed; left:14px; bottom:12px; color:var(--dim); letter-spacing:.04em; max-width:48ch; }
  .tag b{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap"><div class="stage" id="cv"></div></div>
  <p class="tag"><b>one organism</b> &mdash; its growth governed by five numbers: excitement&middot;5, competence&middot;5, sincerity&middot;4, sophistication&middot;4, ruggedness&middot;4. it grows, resolves, dissolves, regrows. never the same.</p>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#dad8d2';
const rnd = (a,b)=> a + Math.random()*(b-a);
function ink(wc,x,y,r,a){ wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a); wc.paintAt(x,y,r,'blue',a); wc.paintAt(x,y,r,'yellow',a*0.45); }

const wc = N.create(document.getElementById('cv'), { gpu:false, pointer:false });
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

// genome — the five scores, 0..1
const G = { excite:1.0, compet:1.0, sincere:0.8, sophist:0.8, rugged:0.8 };
const DIV = Math.round(3 + G.sophist*4);          // sophistication: the lattice density

let tips=[], phase='grow', pStart=0;

function lattice(){ const t=0.006; for(let i=1;i<DIV;i++){ const f=i/DIV; wc.maskNorm(f-t/2,0,t,1); wc.maskNorm(0,f-t/2,1,t); } }
function newGen(){
  wc.reset(); wc.paperColor(PAPER); wc.paintLoad(1.3).waterLoad(1.2); wc.fadePainting(0);
  try{ wc.brushMode('salt'); }catch(_){}                                   // ruggedness: grain
  lattice();
  tips=[]; const k = 1 + Math.floor(Math.random()*2);
  for(let i=0;i<k;i++){ const a=Math.random()*6.28318; tips.push({ x:rnd(0.4,0.6)*GW, y:rnd(0.4,0.6)*GH, hx:Math.cos(a), hy:Math.sin(a), life:rnd(80,180) }); }
  phase='grow';
}

function grow(){
  const step  = GW*0.012*(0.7 + G.excite*0.6);     // excitement: drive
  const vmag  = 0.5 + G.excite*0.45;
  const jit   = 0.14 + G.sincere*0.45;             // sincerity: irregular wander
  const branchP = 0.014 + G.excite*0.05;           // excitement: branching
  const newTips=[];
  for(const tp of tips){
    const ja=(Math.random()*2-1)*jit, c=Math.cos(ja), s=Math.sin(ja);
    let hx=tp.hx*c - tp.hy*s, hy=tp.hx*s + tp.hy*c;
    hy += G.rugged*0.045;                           // ruggedness: downward sag (sediment)
    const m=Math.hypot(hx,hy)||1; hx/=m; hy/=m; tp.hx=hx; tp.hy=hy;
    tp.x += hx*step; tp.y += hy*step; tp.life--;
    const r = GW*(0.012 + G.rugged*0.012);
    ink(wc, tp.x, tp.y, r, 0.5);
    wc.addVelocity(tp.x, tp.y, hx*vmag, hy*vmag, r*1.4);   // viscous fingering forward
    if(Math.random()<branchP && tips.length+newTips.length<44){
      const ba=(Math.random()<0.5?1:-1)*(0.6+Math.random()*0.55), bc=Math.cos(ba), bs=Math.sin(ba);
      newTips.push({ x:tp.x, y:tp.y, hx:hx*bc-hy*bs, hy:hx*bs+hy*bc, life:rnd(45,120) });
    }
  }
  tips = tips.concat(newTips).filter(tp=> tp.life>0 && tp.x>2 && tp.x<GW-2 && tp.y>2 && tp.y<GH-2);
}

function frame(e){
  const w = e - pStart;
  if(phase==='grow'){
    grow();
    if(tips.length===0 || w>15000){ wc.dry(); phase='resolve'; pStart=e; }   // competence: clean resolve
  } else if(phase==='resolve'){
    if(w>2800){ wc.fadePainting(1200); phase='dissolve'; pStart=e; }          // silence, then it recedes
  } else if(phase==='dissolve'){
    if(w>3200){ newGen(); pStart=e; }                                        // regenerate — unique
  }
}

newGen(); pStart=0;
function loop(now){ if(loop.t0==null) loop.t0=now; try{ frame(now-loop.t0); }catch(_){} requestAnimationFrame(loop); }
loop.t0=null; requestAnimationFrame(loop);
</script>
</body>
</html>
