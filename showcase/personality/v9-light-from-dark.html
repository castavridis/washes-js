<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>light, carved from the dark</title>
<style>
  :root{ --bg:#2b2a27; --ink:#e7e5df; --dim:#86847d; --line:#3a3935; --paper:#dad8d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--dim);
    font:12px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4vmin; }
  .stage{ position:relative; width:min(94vmin,940px); aspect-ratio:1/1; background:var(--paper);
    border:1px solid var(--line); overflow:hidden; }
  .tag{ position:fixed; left:14px; bottom:12px; color:var(--dim); letter-spacing:.04em; max-width:52ch; }
  .tag b{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap"><div class="stage" id="cv"></div></div>
  <p class="tag"><b>light, carved from the dark</b> &mdash; the same five forces, run in negative. the field darkens, light breaks open through the grid, resolves, and the dark returns. weighted as you scored them.</p>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#dad8d2';
const rnd = (a,b)=> a + Math.random()*(b-a);
function ink(wc,x,y,r,a){ wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a); wc.paintAt(x,y,r,'blue',a); wc.paintAt(x,y,r,'yellow',a*0.45); }
function carveLight(wc,x,y,r,a){ wc.paintAt(x,y,r,'lift',a); wc.paintAt(x,y,r,'paper',a*0.55); }   // remove dark + add light

const wc = N.create(document.getElementById('cv'), { gpu:false, pointer:false });
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

const G = { excite:1.0, compet:1.0, sincere:0.8, sophist:0.8, rugged:0.8 };
const DIV = Math.round(3 + G.sophist*4), LT = 0.006;

let phase='hold', pStart=0, floodQ=[], seeds=[], n=0;

function newGen(){
  wc.reset(); wc.paperColor(PAPER); wc.fadePainting(0); wc.gravityStrength(0);
  wc.paintLoad(1.4).waterLoad(1.0);
  for(let i=1;i<DIV;i++){ const f=i/DIV; wc.maskNorm(f-LT/2,0,LT,1); wc.maskNorm(0,f-LT/2,1,LT); }   // permanent light lattice
  floodQ=[];
  for(let y=0.03;y<1;y+=0.045) for(let x=0.03;x<1;x+=0.045) floodQ.push([ (x+rnd(-0.012,0.012))*GW, (y+rnd(-0.012,0.012))*GH ]);
  for(let i=floodQ.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0, t=floodQ[i]; floodQ[i]=floodQ[j]; floodQ[j]=t; }   // darken organically
  seeds=[]; const k = 1 + ((Math.random()*2)|0);
  for(let i=0;i<k;i++) seeds.push({ x:rnd(0.28,0.72)*GW, y:rnd(0.28,0.72)*GH, r:GW*0.015 });
  phase='flood';
}

function carveStep(){
  for(const s of seeds){
    s.r += GW*0.0038*(0.7 + G.excite*0.7);                 // excitement: how fast the light breaks open
    const pts = 16;
    for(let i=0;i<pts;i++){
      if(Math.random() < 0.22) continue;                   // ruggedness: ragged gaps in the edge
      const a = i/pts*6.28318 + rnd(-0.25,0.25)*G.sincere*2;// sincerity: irregular carve
      const x = s.x + Math.cos(a)*s.r, y = s.y + Math.sin(a)*s.r;
      carveLight(wc, x, y, GW*(0.016 + G.rugged*0.012), 0.5);
      wc.addVelocity(x, y, Math.cos(a)*0.45*G.excite, Math.sin(a)*0.45*G.excite + G.rugged*0.18, GW*0.03);  // seep + downward sag
    }
    if(n%6===0) ink(wc, s.x + rnd(-1,1)*s.r, s.y + rnd(-1,1)*s.r, GW*0.018, 0.28);   // ruggedness: dark grains at the rim
  }
}

function frame(e){
  n++;
  const w = e - pStart;
  if(phase==='flood'){
    for(let i=0;i<16 && floodQ.length;i++){ const p=floodQ.pop(); ink(wc, p[0], p[1], GW*0.05, 0.5); }   // night falls
    if(floodQ.length===0){ phase='carve'; pStart=e; }
  } else if(phase==='carve'){
    carveStep();
    if(w > 8000){ wc.dry(); phase='hold'; pStart=e; }       // competence: resolve crisp
  } else if(phase==='hold'){
    if(w > 2200){ newGen(); pStart=e; }                     // dark returns; carve anew
  }
}

newGen(); pStart=0;
function loop(t){ if(loop.t0==null) loop.t0=t; try{ frame(t-loop.t0); }catch(_){} requestAnimationFrame(loop); }
loop.t0=null; requestAnimationFrame(loop);
</script>
</body>
</html>
