<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>the words, dissolving</title>
<style>
  :root{ --bg:#b9b7b1; --ink:#1a1a13; --dim:#67665f; --line:#9b998f; --paper:#dad8d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--dim);
    font:12px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4vmin; }
  .stage{ position:relative; width:min(94vmin,940px); aspect-ratio:1/1; background:var(--paper);
    border:1px solid var(--line); overflow:hidden; }
  .tag{ position:fixed; left:14px; bottom:12px; color:var(--dim); letter-spacing:.04em; max-width:52ch; }
  .tag b{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap"><div class="stage" id="cv"></div></div>
  <p class="tag"><b>the words, dissolving</b> &mdash; each of the five qualities, set in type and then consumed by the very thing it names. weighted as you scored them.</p>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#dad8d2';
const rnd = (a,b)=> a + Math.random()*(b-a);
function ink(wc,x,y,r,a){ wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a); wc.paintAt(x,y,r,'blue',a); wc.paintAt(x,y,r,'yellow',a*0.45); }

const wc = N.create(document.getElementById('cv'), { gpu:false, pointer:false });
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

const WORDS = [
  { w:'EXCITEMENT',     f:'excite'  },
  { w:'COMPETENCE',     f:'compet'  },
  { w:'SINCERITY',      f:'sincere' },
  { w:'SOPHISTICATION', f:'sophist' },
  { w:'RUGGEDNESS',     f:'rugged'  },
];

// rasterise a word to an offscreen 2D canvas and deposit ink where the glyphs are
function seedWord(word){
  let c, x;
  try {
    c = document.createElement('canvas'); c.width = GW; c.height = GH;
    x = c.getContext('2d');
    x.clearRect(0,0,GW,GH);
    x.textAlign='center'; x.textBaseline='middle'; x.fillStyle='#000';
    let fs = GH*0.30; x.font = '900 '+fs+'px Helvetica, Arial, sans-serif';
    while (x.measureText(word).width > GW*0.86 && fs > 8){ fs -= 2; x.font = '900 '+fs+'px Helvetica, Arial, sans-serif'; }
    x.fillText(word, GW/2, GH/2);
  } catch(_) { return; }
  let data;
  try { data = x.getImageData(0,0,GW,GH).data; } catch(_) { return; }
  const stride = 3;
  for (let yy=0; yy<GH; yy+=stride) for (let xx=0; xx<GW; xx+=stride){
    if (data[(yy*GW+xx)*4 + 3] > 120) ink(wc, xx, yy, GW*0.014, 0.6);
  }
}

let wi=-1, phase='dissolve', pStart=0, n=0, st={lc:-1};
function startWord(){
  wi = (wi+1) % WORDS.length; const W = WORDS[wi];
  wc.reset(); wc.paperColor(PAPER); wc.fadePainting(0); wc.gravityStrength(0);
  st = { lc:-1 };
  if (W.f==='sincere'){ wc.paintLoad(1.1).waterLoad(1.85); }
  else if (W.f==='rugged'){ wc.paintLoad(1.5).waterLoad(0.7); try{ wc.brushMode('salt'); }catch(_){} wc.gravityVector(0,1); }
  else if (W.f==='sophist'){ wc.paintLoad(1.0).waterLoad(1.0); const div=7,t=0.006; for(let i=1;i<div;i++){ const f=i/div; wc.maskNorm(f-t/2,0,t,1); wc.maskNorm(0,f-t/2,1,t); } }
  else if (W.f==='compet'){ wc.paintLoad(1.3).waterLoad(0.95); }
  else { wc.paintLoad(1.3).waterLoad(1.15); }   // excite
  seedWord(W.w);
  phase='live';
}

function force(f, w){
  if (f==='excite'){ if (n%6===0){ const a=rnd(0,6.28318); wc.addVelocity(rnd(0.2,0.8)*GW, rnd(0.32,0.68)*GH, Math.cos(a)*0.9, Math.sin(a)*0.9, GW*0.05); } }
  else if (f==='rugged'){ const cyc=Math.floor(w/2200);
    if (cyc!==st.lc){ st.lc=cyc; const by=rnd(0.35,0.65); for(let X=0.15;X<=0.85;X+=0.1) wc.rewet(X*GW, by*GH, GW*0.05); wc.gravityStrength(0.14); }
    if (w - cyc*2200 > 1300) wc.gravityStrength(0); }
  // sincere: honest bleed, no touch.  compet/sophist: held legible, resolved at the beat.
}

function frame(e){
  n++;
  const W = WORDS[wi], w = e - pStart;
  if (phase==='live'){
    force(W.f, w);
    if (w > 7000){ phase='hold'; pStart=e; if (W.f==='compet' || W.f==='sophist') wc.dry(); }   // the legible ones snap crisp
  } else if (phase==='hold'){
    if (w > 1600){ wc.fadePainting(1100); phase='dissolve'; pStart=e; }
  } else if (phase==='dissolve'){
    if (w > 2600){ startWord(); pStart=e; }
  }
}

startWord(); pStart=0;
function loop(now){ if (loop.t0==null) loop.t0=now; try{ frame(now-loop.t0); }catch(_){} requestAnimationFrame(loop); }
loop.t0=null; requestAnimationFrame(loop);
</script>
</body>
</html>
