<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>a five-channel recording</title>
<style>
  :root{ --bg:#b9b7b1; --ink:#1a1a13; --dim:#67665f; --line:#9b998f; --paper:#dad8d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--dim);
    font:12px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4vmin; }
  .stage{ position:relative; width:min(96vmin,1040px); aspect-ratio:1.4/1; background:var(--paper);
    border:1px solid var(--line); overflow:hidden; }
  .tag{ position:fixed; left:14px; bottom:12px; color:var(--dim); letter-spacing:.04em; max-width:56ch; }
  .tag b{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap"><div class="stage" id="cv"></div></div>
  <p class="tag"><b>a five-channel recording</b> &mdash; one lane per dimension, top to bottom: excitement, competence, sincerity, sophistication, ruggedness. a pen writes each over time; the wet line bleeds as it goes.</p>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#dad8d2';
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
function ink(wc,x,y,r,a){ wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a); wc.paintAt(x,y,r,'blue',a); wc.paintAt(x,y,r,'yellow',a*0.45); }

const wc = N.create(document.getElementById('cv'), { gpu:false, pointer:false });
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

const LANES = ['excite','compet','sincere','sophist','rugged'];
const SCORE = { excite:1.0, compet:1.0, sincere:0.8, sophist:0.8, rugged:0.8 };
const NL = LANES.length, TOP=0.07, BOT=0.93, LH=(BOT-TOP)/NL, AMP=LH*0.40;
const laneY = (i)=> TOP + (i+0.5)*LH;

// Sophistication: crisp lane separators — the chart's grid
for(let i=1;i<NL;i++){ const yy=TOP+i*LH; wc.maskNorm(0, yy-0.0028, 1, 0.0056); }
wc.maskNorm(0, TOP-0.0028, 1, 0.0056); wc.maskNorm(0, BOT-0.0028, 1, 0.0056);
wc.paintLoad(1.2).waterLoad(1.0);
wc.fadePainting(9000);                                   // comet-tail behind the pen

function mkNoise(){ const ph=[]; for(let k=0;k<5;k++) ph.push(Math.random()*6.28318);
  return (t,f)=>{ let s=0; for(let k=0;k<5;k++) s += Math.sin(t*f*(k+1)*0.6 + ph[k])/(k+1); return s/1.55; }; }
const nEx=mkNoise(), nSi=mkNoise(), nRu=mkNoise();
function signal(f,t){
  switch(f){
    case 'excite':  return clamp(Math.sin(t*7.0)*0.55 + nEx(t,3.0)*0.6, -1,1);                 // loud, jagged
    case 'compet':  return Math.sin(t*0.7)*0.22;                                               // calm, controlled
    case 'sincere': return clamp(nSi(t,0.8)*0.85, -1,1);                                        // honest wander
    case 'sophist': return Math.sin(t*1.3)*0.5 + Math.sin(t*2.6)*0.25 + Math.sin(t*3.9)*0.12;   // structured harmonics
    case 'rugged':  return clamp(Math.sin(t*0.5)*0.5 + nRu(t,6.0)*0.45, -1,1);                  // low drift + grain
  }
  return 0;
}

const SWEEP = 22;                                        // seconds per left->right pass
let prevX=null, prevY={};
function frame(e){
  const t = e/1000, fx = (t % SWEEP)/SWEEP, x = fx*GW;
  if(prevX!==null && x < prevX){ prevX=null; for(const f of LANES) prevY[f]=null; }   // wrapped: lift the pen
  for(let i=0;i<NL;i++){ const f=LANES[i];
    const y = (laneY(i) + signal(f,t)*AMP*SCORE[f]) * GH;
    if(f==='rugged'){ try{ wc.brushMode('salt'); }catch(_){} } else { try{ wc.brushMode('wet'); }catch(_){} }
    if(prevX!==null && prevY[f]!=null){
      const steps = Math.max(1, Math.ceil((x-prevX)/(GW*0.006)));
      for(let k=1;k<=steps;k++){ const tt=k/steps; ink(wc, prevX+(x-prevX)*tt, prevY[f]+(y-prevY[f])*tt, GW*0.012, 0.5); }
    } else { ink(wc, x, y, GW*0.012, 0.5); }
    prevY[f]=y;
  }
  prevX=x;
}

function loop(t){ if(loop.t0==null) loop.t0=t; try{ frame(t-loop.t0); }catch(_){} requestAnimationFrame(loop); }
loop.t0=null; requestAnimationFrame(loop);
</script>
</body>
</html>
