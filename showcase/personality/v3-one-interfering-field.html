<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A personality, interfering with itself</title>
<style>
  :root{ --bg:#bdbbb6; --ink:#15150f; --dim:#5a5953; --line:#9d9b95; --paper:#d9d7d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; background:var(--bg); color:var(--ink);
    font:15px/1.6 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5vh 4vw; gap:18px; }
  h1{ font-size:13px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; margin:0; color:var(--ink); }
  .stage{ position:relative; width:min(86vw,720px); aspect-ratio:1/1; background:var(--paper);
    border:1px solid var(--line); border-radius:2px; overflow:hidden; cursor:pointer; }
  .note{ margin:0; color:var(--dim); font-size:12px; text-align:center; max-width:60ch; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>A personality, interfering with itself</h1>
    <div class="stage" id="cv"></div>
    <p class="note">One field. Five forces &mdash; excitement, competence, sincerity, sophistication, ruggedness &mdash; act on the same wash at once, weighted as you scored them, disciplined by an invisible grid. It paints itself over ~80&thinsp;s and settles. Click to begin again.</p>
  </div>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#d9d7d2';
const GOLD = 2.399963229728653;
const rnd = (a,b)=> a + Math.random()*(b-a);
const DIV = 6;

const wc = N.create(document.getElementById('cv'), { gpu:false, pointer:false });
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

function ink(x,y,r,a){
  wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a);
  wc.paintAt(x,y,r,'blue',a);       wc.paintAt(x,y,r,'yellow',a*0.45);
}

let n, theta, st, t0;
function setup(){
  wc.reset();
  wc.paperColor(PAPER);
  wc.paintLoad(1.3).waterLoad(1.2);
  wc.fadePainting(0); wc.gravityStrength(0);
  const t = 0.010;
  for (let i=1;i<DIV;i++){ const f=i/DIV; wc.maskNorm(f-t/2,0,t,1); wc.maskNorm(0,f-t/2,1,t); }
  for (let k=0;k<5;k++) ink(rnd(0.2,0.8)*GW, rnd(0.2,0.8)*GH, GW*0.05, 0.8);
  n=0; theta=0; st={ fade:false, weather:false, lastCyc:-1, dried:0, held:false }; t0=null;
}

function frame(e){
  n++;
  if (e < 6000){ if (n%30===0) ink(rnd(0.2,0.8)*GW, rnd(0.2,0.8)*GH, GW*0.04, 0.6); return; }

  if (e < 30000){                                   // EXCITEMENT 5
    if (!st.fade){ wc.fadePainting(2600); wc.gravityStrength(0.12); st.fade=true; }
    theta += 0.014; wc.gravityVector(Math.cos(theta), Math.sin(theta));
    if (n%5===0) ink((0.5+rnd(-0.12,0.12))*GW, (0.5+rnd(-0.12,0.12))*GH, GW*0.04, 0.6);
    if (n%64 < 2){ const a = theta + GOLD*n; wc.addVelocity(rnd(0.3,0.7)*GW, rnd(0.3,0.7)*GH, Math.cos(a)*0.95, Math.sin(a)*0.95, GW*0.045); }
    return;
  }

  if (e < 48000){                                   // RUGGEDNESS 4 — weathering
    if (!st.weather){ wc.fadePainting(0); wc.gravityVector(0,1); st.weather=true; }
    const cyc = Math.floor((e-30000)/2400);
    if (cyc !== st.lastCyc){ st.lastCyc = cyc; const by = Math.min(0.85, 0.22 + cyc*0.09);
      for (let x=0.12;x<=0.88;x+=0.08) wc.rewet(x*GW, by*GH, GW*(0.045+Math.random()*0.02));
      wc.gravityStrength(0.15); }
    if ((e-30000) - cyc*2400 > 1400) wc.gravityStrength(0);
    return;
  }

  if (e < 62000){                                   // SINCERITY 4 — honest erosion
    wc.gravityStrength(0);
    if (n%4===0){ const x=rnd(0.1,0.9), y=rnd(0.1,0.9), r=GW*rnd(0.02,0.05);
      if (n%3===0) wc.paintAt(x*GW,y*GH,r,'paper',0.5);
      else { wc.paintAt(x*GW,y*GH,r,'lift',0.5); wc.rewet(x*GW,y*GH,r); } }
    return;
  }

  if (e < 80000){                                   // COMPETENCE 5 — settle into order
    const cells = DIV*DIV, step = 18000/cells;
    const idx = Math.floor((e-62000)/step);
    while (st.dried <= idx && st.dried < cells){
      const gx = st.dried % DIV, gy = (st.dried / DIV) | 0;
      wc.dry((gx+0.5)/DIV*GW, (gy+0.5)/DIV*GH, GW*(0.46/DIV)); st.dried++;
    }
    return;
  }

  if (!st.held){ wc.gravityStrength(0); st.held = true; }   // finished — held
}

function loop(now){ if (t0==null) t0=now; try{ frame(now-t0); }catch(_){} requestAnimationFrame(loop); }
setup(); requestAnimationFrame(loop);
document.getElementById('cv').addEventListener('click', setup);
</script>
</body>
</html>
