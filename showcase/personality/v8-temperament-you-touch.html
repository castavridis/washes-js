<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>a temperament you can touch</title>
<style>
  :root{ --bg:#b9b7b1; --ink:#1a1a13; --dim:#67665f; --line:#9b998f; --paper:#dad8d2; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--dim);
    font:12px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial; -webkit-font-smoothing:antialiased; }
  .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4vmin; }
  .stage{ position:relative; width:min(94vmin,940px); aspect-ratio:1/1; background:var(--paper);
    border:1px solid var(--line); overflow:hidden; cursor:crosshair; touch-action:none; }
  .tag{ position:fixed; left:14px; bottom:12px; color:var(--dim); letter-spacing:.04em; max-width:52ch; }
  .tag b{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap"><div class="stage" id="cv"></div></div>
  <p class="tag"><b>move across the field.</b> it answers with all five at once &mdash; speed flings lines, your path is kept, a grid disciplines it, pausing resolves it, stillness weathers it. weighted as you scored them.</p>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
const N = window.Washes;
const PAPER = '#dad8d2';
const rnd = (a,b)=> a + Math.random()*(b-a);
function ink(wc,x,y,r,a){ wc.paintAt(x,y,r,'yellow',a*1.3); wc.paintAt(x,y,r,'rose',a); wc.paintAt(x,y,r,'blue',a); wc.paintAt(x,y,r,'yellow',a*0.45); }

const stage = document.getElementById('cv');
const wc = N.create(stage, { gpu:false, pointer:false });   // we drive it ourselves
const S = wc.state(), GW = S.gridWidth, GH = S.gridHeight;

const G = { excite:1.0, compet:1.0, sincere:0.8, sophist:0.8, rugged:0.8 };   // the temperament

// Sophistication: an invisible lattice the marks discipline to
const DIV = Math.round(3 + G.sophist*4), LT = 0.006;
for (let i=1;i<DIV;i++){ const f=i/DIV; wc.maskNorm(f-LT/2,0,LT,1); wc.maskNorm(0,f-LT/2,1,LT); }
wc.paintLoad(1.2).waterLoad(1.1);
wc.fadePainting(7000);                                       // a living surface that slowly recedes

let last=null, lastMove=0, resolved=true, gravOn=false, lc=-1, n=0;
function loc(e){ const r=wc.displayRect(); return { gx:(e.clientX-r.x)/r.width*GW, gy:(e.clientY-r.y)/r.height*GH }; }
function clampn(v,a,b){ return v<a?a:v>b?b:v; }

function onMove(e){
  const now = (typeof performance!=='undefined'?performance.now():Date.now());
  const p = loc(e);
  if (last){
    const dt = Math.max(8, now-last.t), dx = p.gx-last.gx, dy = p.gy-last.gy;
    const sp = Math.hypot(dx,dy)/dt;                         // grid units / ms
    const r  = GW*clampn(0.018 + sp*0.5, 0.018, 0.06);
    ink(wc, p.gx, p.gy, r, 0.30 + 0.25*G.sincere);          // Sincerity: honest record of your path
    const len = Math.hypot(dx,dy) || 1;
    const vmag = clampn(sp*3.4, 0, 1.0) * G.excite;          // Excitement: your speed flings lines
    wc.addVelocity(p.gx, p.gy, dx/len*vmag, dy/len*vmag, r*1.3);
  }
  last = { gx:p.gx, gy:p.gy, t:now };
  lastMove = now; resolved = false;
  if (gravOn){ wc.gravityStrength(0); gravOn=false; } lc = -1;   // your motion stops the weathering
}
stage.addEventListener('pointermove', onMove);
stage.addEventListener('pointerdown', (e)=>{ last=null; onMove(e); });
stage.addEventListener('pointerleave', ()=>{ last=null; });

// a little life to begin with, so the untouched field already breathes
(function seed(){ const a=rnd(0,6.28318); let x=0.5, y=0.5; last=null;
  for(let i=0;i<26;i++){ x+=Math.cos(a+i*0.21)*0.02; y+=Math.sin(a+i*0.21)*0.02; ink(wc, x*GW, y*GH, GW*0.02, 0.45); }
})();

function frame(){
  n++;
  const now = (typeof performance!=='undefined'?performance.now():Date.now());
  const idle = now - lastMove;
  if (!resolved && idle > 420){ wc.dry(); resolved = true; }            // Competence: pause -> clean resolve
  if (idle > 2600){                                                     // Ruggedness: stillness weathers it
    const t = idle - 2600, cyc = Math.floor(t/2000);
    if (cyc !== lc){ lc = cyc; if(!gravOn){ wc.gravityVector(0,1); gravOn=true; }
      const by = rnd(0.2,0.8); for(let x=0.15;x<=0.85;x+=0.12) wc.rewet(x*GW, by*GH, GW*0.05);
      wc.gravityStrength(0.12); }
    if (t - cyc*2000 > 1200) wc.gravityStrength(0);
  }
}
function loop(t){ if(loop.t0==null) loop.t0=t; lastMove = lastMove||0; try{ frame(); }catch(_){} requestAnimationFrame(loop); }
loop.t0=null; requestAnimationFrame(loop);
</script>
</body>
</html>
