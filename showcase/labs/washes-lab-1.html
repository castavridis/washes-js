<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Washes — Lab I — physics</title>
<style>
  :root{ color-scheme:dark; --bg:#0e0f12; --panel:#16181d; --ink:#e8e6e1; --dim:#8b8a86; --line:#26282e; --accent:#c98b6e; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%}
  #app{display:grid;grid-template-columns:262px 1fr;height:100vh;background:var(--bg)}
  #side{border-right:1px solid var(--line);overflow-y:auto;padding:14px 0;background:var(--panel)}
  #side h1{font-size:15px;margin:0 16px 2px;letter-spacing:.02em}
  #side .sub{font-size:11.5px;color:var(--dim);margin:0 16px 12px}
  .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin:14px 16px 4px}
  .item{padding:7px 16px;cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;gap:7px}
  .item:hover{background:#1b1d23}
  .item.on{background:#1d2027;border-left-color:var(--accent);color:#fff}
  .item .badge{font-size:9px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:1px 5px;margin-left:auto;white-space:nowrap}
  #main{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  #hud{padding:13px 18px;border-bottom:1px solid var(--line);background:var(--bg)}
  #hud .t{font-size:15px;font-weight:600}
  #hud .n{font-size:12.5px;color:var(--dim);margin-top:3px;max-width:70ch}
  #labstatus{font-size:12px;color:var(--accent);margin-top:6px;min-height:1.2em}
  #enable{display:inline-block;margin-top:9px;background:var(--accent);color:#1a1207;border:0;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
  #enable[hidden]{display:none}
  #stagewrap{flex:1;display:flex;align-items:center;justify-content:center;padding:22px;min-height:0;background:radial-gradient(900px 600px at 50% 0,#15171c,#0e0f12)}
  #stage{width:min(78vmin,620px);height:min(78vmin,620px);background:#fff;border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,.5);overflow:hidden;position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
  #stage canvas{display:block;width:100%;height:100%}
  .foot{padding:8px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);background:var(--bg)}
  @media (max-width:760px){
    #app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    #side{border-right:0;border-bottom:1px solid var(--line);padding:8px 0;display:flex;flex-direction:column;gap:4px;max-height:none;background:var(--panel)}
    #side h1{margin:0 14px;font-size:14px} #side .sub{display:none}
    #list{display:flex;flex-direction:row;gap:6px;overflow-x:auto;padding:0 12px 4px;-webkit-overflow-scrolling:touch}
    .grp{display:none}
    .item{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;padding:7px 13px;background:#1d2027;color:var(--ink)}
    .item.on{background:#2a2118;border-color:var(--accent);color:#fff}
    #stagewrap{padding:12px} #stage{width:min(92vw,540px);height:min(92vw,540px)} #hud{padding:10px 14px}
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side">
    <h1>Washes — Lab · I</h1>
    <div class="sub">Ten experiments where the input never paints — it bends the medium's physics.</div>
    <div id="list"></div>
  </nav>
  <section id="main">
    <div id="hud"><div class="t" id="htitle">—</div><div class="n" id="hnote"></div><div id="labstatus"></div><button id="enable" hidden>Tap to enable motion</button></div>
    <div id="stagewrap"><div id="stage"></div></div>
    <div class="foot">Camera/mic/motion stay on your device and are used only while a scene runs. Each scene falls back to an autonomous mode if a sensor is unavailable.</div>
  </section>
</div>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
// ---------------------------------------------------------------------------
// Helpers (shared) ----------------------------------------------------------
function newInst(host){const i=Washes.create(host,{gpu:false,pointer:false});const s=i.state();return {i,GW:s.gridWidth,GH:s.gridHeight};}
function canvasRect(host){const c=host&&host.querySelector&&host.querySelector('canvas');const r=(c||host).getBoundingClientRect();return {x:r.left,y:r.top,w:r.width||560,h:r.height||560};}
function wetPaper(i){try{const wp=i.paperWetnessPresets&&i.paperWetnessPresets();if(wp&&wp.length){const pick=wp.find(n=>/wet|flood|soak|damp/i.test(n))||wp[wp.length-1];i.paperWetness(pick);}}catch(e){}}
function bye(i){try{i.destroy();}catch(e){}}
function pastel(i,load){try{i.paintLoad(load==null?0.28:load);i.waterLoad(1.0);}catch(e){}try{i.fadePainting(true);}catch(e){}}
function labStatus(msg){const el=document.getElementById('labstatus');if(el)el.textContent=msg||'';}
const WATER=-1, MASK=-4;                          // verified negative brush indices

// Browser gate: set true only by the shell (below the marker), so the headless
// harness — which evaluates only helpers+scenes — sees it false and every
// loader degrades to the autonomous fallback instead of touching the network.
function inBrowser(){return typeof window!=='undefined' && !!window.__LAB_BROWSER__ && typeof navigator!=='undefined' && !!(navigator.mediaDevices);}

const THREE_URL='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
const VISION_URL='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';
const WASM_URL='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm';
const HAND_MODEL='https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';
const FACE_MODEL='https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';

let _three,_threeTried;
async function loadThree(){ if(!inBrowser())return null; if(_threeTried)return _three; _threeTried=1; try{_three=await import(THREE_URL);}catch(e){_three=null;} return _three; }
let _vision,_visionTried;
async function loadVision(){ if(!inBrowser())return null; if(_visionTried)return _vision; _visionTried=1; try{_vision=await import(VISION_URL);}catch(e){_vision=null;} return _vision; }
async function getCamera(){ if(!inBrowser())return null; try{ const s=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}}); const v=document.createElement('video'); v.muted=true;v.playsInline=true;v.autoplay=true;v.srcObject=s;v.__stream=s; await (v.play?v.play().catch(()=>{}):0); return v; }catch(e){ return null; } }
async function makeHand(){ const V=await loadVision(); if(!V)return null; try{ const fs=await V.FilesetResolver.forVisionTasks(WASM_URL); return await V.HandLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:HAND_MODEL,delegate:'GPU'},numHands:1,runningMode:'VIDEO'}); }catch(e){ return null; } }
async function makeFace(){ const V=await loadVision(); if(!V)return null; try{ const fs=await V.FilesetResolver.forVisionTasks(WASM_URL); return await V.FaceLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:FACE_MODEL,delegate:'GPU'},outputFaceBlendshapes:true,runningMode:'VIDEO',numFaces:1}); }catch(e){ return null; } }
async function getMic(){ if(!inBrowser())return null; try{ const s=await navigator.mediaDevices.getUserMedia({audio:true}); const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC(); if(ac.state==='suspended'){ try{ await ac.resume(); }catch(e){} } window.__ac=ac; const src=ac.createMediaStreamSource(s); const an=ac.createAnalyser(); an.fftSize=1024; src.connect(an); return {an,ac,stream:s,buf:new Uint8Array(an.frequencyBinCount)}; }catch(e){ return null; } }
function stopTracks(v){ try{ const s=v&&(v.__stream||v.srcObject); if(s&&s.getTracks)s.getTracks().forEach(t=>t.stop()); }catch(e){} }
function now(){ return (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now(); }
const _tilt={g:0,b:0,on:false};
function getTilt(){ return _tilt; }
function tiltSupported(){ return inBrowser() && typeof window.DeviceOrientationEvent!=='undefined'; }
function needsMotionPermission(){ return tiltSupported() && typeof window.DeviceOrientationEvent.requestPermission==='function'; }
function attachMotion(){ if(_tilt.on||!tiltSupported())return; _tilt.on=true; try{ window.addEventListener('deviceorientation',e=>{ _tilt.g=e.gamma||0; _tilt.b=e.beta||0; }); }catch(e){} }
async function enableMotion(){ if(!tiltSupported())return false; try{ if(needsMotionPermission()){ const r=await window.DeviceOrientationEvent.requestPermission(); if(r!=='granted')return false; } attachMotion(); return true; }catch(e){ return false; } }

// ---- scenes ---------------------------------------------------------------
// Each scene: build(host) -> { frame(elapsedMs), cleanup() }.
// Thesis: the sensor bends the medium's physics (gravity, wetness, masking,
// dilution) — it is never a brush. State is created synchronously; async init
// fills it in when ready; frame() is always safe and degrades to autonomy.
const SCENES = [

// ===================== CAMERA & BODY =====================
{ id:"tide", grp:"Camera & body", needs:"camera", title:"Tide — motion is invisible water",
  note:"The camera image is never drawn. Frame-to-frame motion is read as a field of invisible water that re-wets a dried wash, so the paint blooms only where you move. Standing still lets it settle; a wave of the hand sends a tide through it.",
  build(host){ const {i,GW,GH}=newInst(host);
    for(let k=0;k<520;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,7,Math.random()*3|0,0.5); try{i.dry();}catch(e){}
    const st={video:null,prev:null,octx:null,dead:false}; let auto=0;
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — the tide drifts on its own. Allow the webcam and your motion will stir it.');return;}
      st.video=v; const oc=document.createElement('canvas'); oc.width=48; oc.height=36; st.octx=oc.getContext('2d',{willReadFrequently:true});
      labStatus('Move in front of the camera — your motion is the only thing that re-wets and bleeds the dried wash.'); })();
    function frame(t){
      if(st.video&&st.octx&&st.video.readyState>=2){ const W=48,H=36;
        try{ st.octx.drawImage(st.video,0,0,W,H); }catch(e){ return; } let d; try{ d=st.octx.getImageData(0,0,W,H).data; }catch(e){ return; }
        const cur=new Float32Array(W*H); for(let p=0;p<W*H;p++) cur[p]=(d[p*4]+d[p*4+1]+d[p*4+2])/765;
        if(st.prev){ let cxs=0,cys=0,m=0;
          for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const idx=y*W+x, mv=Math.abs(cur[idx]-st.prev[idx]); if(mv>0.12){ const gx=(1-x/W)*GW, gy=y/H*GH; i.grid.paint(gx,gy,Math.max(3,GW*0.03),WATER,Math.min(0.5,mv)); cxs+=x;cys+=y;m++; } }
          if(m>4){ const ax=(1-(cxs/m)/W)-0.5, ay=(cys/m)/H-0.5; const dir=Math.abs(ax)>Math.abs(ay)?(ax>0?'right':'left'):(ay>0?'down':'up'); try{i.gravityDirection(dir);i.gravityStrength(Math.min(0.12,m*0.004));}catch(e){} }
          else { try{i.gravityStrength(0);}catch(e){} } }
        st.prev=cur;
      } else { auto++; if(auto%6===0){ const x=GW*(0.5+0.4*Math.sin(t*0.0007)), y=GH*(0.5+0.4*Math.cos(t*0.0005)); i.grid.paint(x,y,GW*0.04,WATER,0.25); } }
    }
    return { frame, cleanup(){ st.dead=true; stopTracks(st.video); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"lodestone", grp:"Camera & body", needs:"hand", title:"Lodestone — your hand tilts the paper",
  note:"A wet pool of pigment sits on the sheet. Your hand's position tilts the paper so the pool runs that way, and opening or closing your hand pours harder or softer. You never touch the paint; you only change which way is down.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<140;k++){ const a=Math.random()*6.2832, rr=Math.sqrt(Math.random())*GW*0.12; i.grid.paint(GW*0.5+Math.cos(a)*rr,GH*0.4+Math.sin(a)*rr,5,k%3,0.6); }
    const st={video:null,hand:null,dead:false};
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — the pour drifts on a slow orbit. Allow the webcam to tilt it with your hand.');return;}
      st.video=v; const hl=await makeHand(); if(st.dead){try{hl&&hl.close();}catch(e){}stopTracks(v);return;} if(!hl){labStatus('Hand tracking unavailable — drifting on its own.');return;}
      st.hand=hl; labStatus('Hold up a hand: its position tilts the paper; open or close it to pour harder or softer.'); })();
    function frame(t){
      if(st.hand&&st.video&&st.video.readyState>=2){ let res; try{res=st.hand.detectForVideo(st.video,now());}catch(e){res=null;} const lm=res&&res.landmarks&&res.landmarks[0];
        if(lm){ const wrist=lm[0], mid=lm[9]; const cx=1-(wrist.x+mid.x)/2, cy=(wrist.y+mid.y)/2; const ax=cx-0.5, ay=cy-0.5;
          const dir=Math.abs(ax)>Math.abs(ay)?(ax>0?'right':'left'):(ay>0?'down':'up');
          let open=0; for(const ti of [4,8,12,16,20]){ open+=Math.hypot(lm[ti].x-wrist.x,lm[ti].y-wrist.y); } open/=5;
          try{i.gravityDirection(dir);i.gravityStrength(Math.min(0.2,Math.max(0.02,(open-0.12)*1.2)));}catch(e){} } }
      else { const dir=['down','right','up','left'][(((t*0.0004)/(Math.PI/2))|0)%4]; try{i.gravityDirection(dir);i.gravityStrength(0.06+0.04*Math.sin(t*0.0008));}catch(e){} }
    }
    return { frame, cleanup(){ st.dead=true; try{st.hand&&st.hand.close();}catch(e){} stopTracks(st.video); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"breath", grp:"Camera & body", needs:"face", title:"Breath — it moves when you look away",
  note:"While your eyes are open the wash is frozen and held still under your gaze. Close your eyes and it unlocks — bleeding and breathing in the moment you stop watching. Open your mouth for a deep bloom. The painting only lives when unobserved.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<420;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,6,Math.random()*3|0,0.4);
    const st={video:null,face:null,dead:false,frozen:null};
    function freeze(on){ if(on===st.frozen)return; st.frozen=on; try{ if(on){ i.mask(0,0,1,1,0); i.maskTint(true);} else {i.removeMask();i.maskTint(false);} }catch(e){} }
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — it breathes on a slow cycle. Allow the webcam: it holds still while you watch and evolves when you close your eyes.');return;}
      st.video=v; const fl=await makeFace(); if(st.dead){try{fl&&fl.close();}catch(e){}stopTracks(v);return;} if(!fl){labStatus('Face tracking unavailable — breathing on its own.');return;}
      st.face=fl; labStatus('Open eyes hold the wash still; close your eyes and it bleeds. Open your mouth for a deep bloom.'); })();
    function frame(t){
      if(st.face&&st.video&&st.video.readyState>=2){ let res; try{res=st.face.detectForVideo(st.video,now());}catch(e){res=null;}
        const bs=res&&res.faceBlendshapes&&res.faceBlendshapes[0]&&res.faceBlendshapes[0].categories;
        if(bs){ const g=n=>{const c=bs.find(c=>c.categoryName===n);return c?c.score:0;}; freeze((g('eyeBlinkLeft')+g('eyeBlinkRight'))/2<0.5);
          if(g('jawOpen')>0.4){ for(let k=0;k<8;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,GW*0.05,WATER,0.3); } } }
      else { freeze(Math.sin(t*0.0004)>0); if(Math.sin(t*0.0004)<-0.985){ for(let k=0;k<6;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,GW*0.05,WATER,0.2); } }
    }
    return { frame, cleanup(){ st.dead=true; try{st.face&&st.face.close();}catch(e){} stopTracks(st.video); try{i.removeMask();}catch(e){} bye(i); } };
  } },

{ id:"dilation", grp:"Camera & body", needs:"hand", title:"Dilation — pinch the pigment thinner",
  note:"A slow painter lays one stroke after another on its own. Your pinch doesn't move the brush — it changes the water-to-pigment ratio of the whole medium: bring thumb and finger together for pale dilute pastel, spread them apart for saturated, heavy paint.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const st={video:null,hand:null,dead:false,load:0.3}; let pig=0,last=-1e9;
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — dilution breathes on a sine. Allow the webcam to set it by pinching.');return;}
      st.video=v; const hl=await makeHand(); if(st.dead){try{hl&&hl.close();}catch(e){}stopTracks(v);return;} if(!hl){labStatus('Hand tracking unavailable.');return;}
      st.hand=hl; labStatus('Pinch thumb to finger for pale dilute pastel; spread them for saturated, heavy pigment.'); })();
    function frame(t){
      if(st.hand&&st.video&&st.video.readyState>=2){ let res; try{res=st.hand.detectForVideo(st.video,now());}catch(e){res=null;} const lm=res&&res.landmarks&&res.landmarks[0];
        if(lm){ const d=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y); st.load=Math.min(1.0,Math.max(0.04,(d-0.02)*2.2)); } }
      else { st.load=0.04+0.5*(0.5+0.5*Math.sin(t*0.0006)); }
      try{i.paintLoad(st.load);}catch(e){}
      if(t-last>90){ pig=(pig+1)%3; const x=GW*(0.5+0.4*Math.sin(t*0.0011)), y=GH*(0.5+0.4*Math.sin(t*0.0013+1)); i.grid.paint(x,y,GW*0.06,pig,0.5); last=t; }
    }
    return { frame, cleanup(){ st.dead=true; try{st.hand&&st.hand.close();}catch(e){} stopTracks(st.video); bye(i); } };
  } },

// ===================== 3D / three.js =====================
{ id:"sundial", grp:"3D / three.js", needs:"three.js", title:"Sundial — a 3D sun crisps the wash",
  note:"A three.js point-light orbits an unseen sheet; its rendered brightness is read back each frame to find where the light currently falls. There, the wash is masked crisp and held; everywhere else it stays free to bleed. A slow sun that sets the paint where it touches.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<460;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,6,Math.random()*3|0,0.45);
    const st={rend:null,scene:null,cam:null,light:null,octx:null,dead:false};
    (async()=>{ const T=await loadThree(); if(st.dead)return; if(!T){labStatus('three.js unavailable — the light sweeps on a timer.');return;}
      try{ const sc=new T.Scene(); const cam=new T.PerspectiveCamera(50,1,0.1,100); cam.position.set(0,0,6);
        const rend=new T.WebGLRenderer({antialias:false,preserveDrawingBuffer:true}); rend.setSize(80,80);
        sc.add(new T.Mesh(new T.PlaneGeometry(9,9), new T.MeshStandardMaterial({color:0xffffff,roughness:1})));
        const light=new T.PointLight(0xffffff,40,60); sc.add(light); sc.add(new T.AmbientLight(0x101010));
        const oc=document.createElement('canvas'); oc.width=80; oc.height=80; const octx=oc.getContext('2d',{willReadFrequently:true});
        st.rend=rend;st.scene=sc;st.cam=cam;st.light=light;st.octx=octx;
        labStatus('A 3D sun orbits an unseen sheet — where its light falls the wash is held crisp; behind it the paper bleeds.'); }
      catch(e){ st.rend=null; labStatus('three.js init failed — the light sweeps on a timer.'); } })();
    let cur=-1;
    function band(cx){ const x=Math.round(cx*40)/40; if(x===cur)return; cur=x; try{ i.removeMask(); i.mask(x-0.13,0,0.26,1,0); i.maskTint(true); }catch(e){} }
    function frame(t){
      if(st.rend){ const ang=t*0.0006; st.light.position.set(Math.cos(ang)*6,Math.sin(ang*0.5)*2,3+Math.sin(ang)*2);
        try{ st.rend.render(st.scene,st.cam); st.octx.drawImage(st.rend.domElement,0,0,80,80); const d=st.octx.getImageData(0,0,80,80).data;
          let bx=0,bv=-1; for(let x=0;x<80;x++){ let s=0; for(let y=0;y<80;y+=4) s+=d[(y*80+x)*4]; if(s>bv){bv=s;bx=x;} } band(bx/80); }catch(e){} }
      else { band(0.5+0.45*Math.sin(t*0.0006)); }
    }
    return { frame, cleanup(){ st.dead=true; try{i.removeMask();}catch(e){} try{st.rend&&st.rend.dispose&&st.rend.dispose();}catch(e){} bye(i); } };
  } },

{ id:"relief", grp:"3D / three.js", needs:"three.js", title:"Relief — a form revealed by absence",
  note:"An invisible 3D solid turns in space. Its silhouette is rendered, read back, and used purely as a mask: paint is laid everywhere but blocked wherever the solid is, so the shape appears only as the clean negative space the wash refuses to enter.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const GW2=Math.min(GW,GH);
    const st={rend:null,scene:null,cam:null,mesh:null,octx:null,dead:false,N:26}; let last=-1e9,pig=0;
    (async()=>{ const T=await loadThree(); if(st.dead)return; if(!T){labStatus('three.js unavailable — using a turning analytic form.');return;}
      try{ const sc=new T.Scene(); const cam=new T.PerspectiveCamera(45,1,0.1,100); cam.position.set(0,0,5);
        const rend=new T.WebGLRenderer({antialias:false,preserveDrawingBuffer:true,alpha:true}); rend.setSize(st.N,st.N);
        const mesh=new T.Mesh(new T.TorusKnotGeometry(1,0.34,80,12), new T.MeshBasicMaterial({color:0xffffff})); sc.add(mesh);
        const oc=document.createElement('canvas'); oc.width=st.N; oc.height=st.N; const octx=oc.getContext('2d',{willReadFrequently:true});
        st.rend=rend;st.scene=sc;st.cam=cam;st.mesh=mesh;st.octx=octx;
        labStatus('A hidden 3D knot turns; the wash floods around it, so the form shows only as the space the paint will not enter.'); }
      catch(e){ st.rend=null; labStatus('three.js init failed — using a turning analytic form.'); } })();
    function maskFromGrid(g,N){ try{ const {x:MX,y:MY,w:DW,h:DH}=canvasRect(host); i.removeMask(); const cw=DW/N, ch=DH/N;
      for(let y=0;y<N;y++)for(let x=0;x<N;x++){ if(g[y*N+x]>0.4) i.mask(x/N,y/N,1/N+1/DW,1/N+1/DH,0); } }catch(e){} }
    function frame(t){
      if(t-last<150){ return; } last=t; pig=(pig+1)%3; let g=null, N=st.N;
      if(st.rend){ st.mesh.rotation.x=t*0.0004; st.mesh.rotation.y=t*0.0006;
        try{ st.rend.render(st.scene,st.cam); st.octx.clearRect(0,0,N,N); st.octx.drawImage(st.rend.domElement,0,0,N,N); const d=st.octx.getImageData(0,0,N,N).data;
          g=new Float32Array(N*N); for(let p=0;p<N*N;p++) g[p]=(d[p*4]+d[p*4+1]+d[p*4+2])/765; }catch(e){ g=null; } }
      if(!g){ N=st.N; g=new Float32Array(N*N); const cx=N/2+Math.cos(t*0.0006)*N*0.18, cy=N/2+Math.sin(t*0.0006)*N*0.18, rad=N*0.22;
        for(let y=0;y<N;y++)for(let x=0;x<N;x++) g[y*N+x]=(Math.hypot(x-cx,y-cy)<rad)?1:0; }
      maskFromGrid(g,N);
      for(let k=0;k<80;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,GW2*0.03,pig,0.18);
    }
    return { frame, cleanup(){ st.dead=true; try{i.removeMask();}catch(e){} try{st.rend&&st.rend.dispose&&st.rend.dispose();}catch(e){} bye(i); } };
  } },

// ===================== SENSORS & SOUND =====================
{ id:"seismograph", grp:"Sensors & sound", needs:"tilt", title:"Seismograph — a record of handling",
  note:"Tilt is gravity, and nothing fades. Every time the device is tipped, wet pigment runs downhill and dries into a permanent runnel, so the finished sheet is a physical record of how it was held over time. On desktop, drag to tilt.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let gx=4;gx<GW;gx+=2) i.grid.paint(gx,GH*0.12,4,gx%3,0.6);
    const st={dead:false,g:0,b:0};
    function onPointer(e){ const c=host.querySelector('canvas')||host, r=c.getBoundingClientRect(); st.g=((e.clientX-r.left)/(r.width||560)-0.5)*90; st.b=((e.clientY-r.top)/(r.height||560)-0.5)*90; }
    const cv=host.querySelector('canvas'); if(cv) cv.addEventListener('pointermove',onPointer);
    labStatus('Tilt your device to pour — runnels are permanent, so the sheet records how it was handled. (On desktop, drag to tilt.)');
    function frame(t){ const tl=getTilt(); if(tl.on){ st.g=tl.g; st.b=tl.b; }
      const ax=st.g/45, ay=st.b/45, mag=Math.min(0.22,Math.hypot(ax,ay)*0.18);
      if(mag>0.01){ const dir=Math.abs(ax)>Math.abs(ay)?(ax>0?'right':'left'):(ay>0?'down':'up'); try{i.gravityDirection(dir);i.gravityStrength(mag);}catch(e){} }
      else { try{i.gravityStrength(0.02);}catch(e){} } }
    return { frame, cleanup(){ st.dead=true; if(cv)cv.removeEventListener('pointermove',onPointer); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"tacet", grp:"Sensors & sound", needs:"mic", title:"Tacet — silence is the active input",
  note:"Audio-reactive, reversed. Sound freezes the painting solid; only in silence does it unlock and breathe, water seeping through the pigment while no one speaks. Named for the musical instruction to be silent — here, silence is the only thing that moves it.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<400;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,6,Math.random()*3|0,0.4);
    const st={mic:null,dead:false,frozen:null};
    function freeze(on){ if(on===st.frozen)return; st.frozen=on; try{ if(on){ i.mask(0,0,1,1,0); i.maskTint(true);} else {i.removeMask();i.maskTint(false);} }catch(e){} }
    (async()=>{ const m=await getMic(); if(st.dead){try{m&&m.ac.close();}catch(e){}return;} if(!m){labStatus('No microphone — it breathes on a timer. Allow the mic: noise freezes the wash, silence lets it bloom.');return;}
      st.mic=m; labStatus('Make noise to freeze the painting; in silence it breathes and bleeds. (Backwards on purpose.)'); })();
    function frame(t){ let loud;
      if(st.mic){ st.mic.an.getByteFrequencyData(st.mic.buf); let s=0; for(let k=0;k<st.mic.buf.length;k++) s+=st.mic.buf[k]; loud=s/st.mic.buf.length/255; }
      else { loud=0.5+0.5*Math.sin(t*0.0005); }
      freeze(loud>0.18);
      if(!st.frozen){ for(let k=0;k<3;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,GW*0.04,WATER,0.12); }
    }
    return { frame, cleanup(){ st.dead=true; try{ st.mic&&st.mic.ac.close(); st.mic&&st.mic.stream.getTracks().forEach(t=>t.stop()); }catch(e){} try{i.removeMask();}catch(e){} bye(i); } };
  } },

// ===================== AUTONOMOUS =====================
{ id:"murmuration", grp:"Autonomous", needs:"none", title:"Murmuration — flight paths that bloom",
  note:"A flock of invisible agents flocks across a dried wash, and the only mark they leave is water: wherever a bird passes it re-wets the paper, so the old pigment blooms back to life along trajectories you can feel but never see.",
  build(host){ const {i,GW,GH}=newInst(host);
    for(let k=0;k<620;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,6,Math.random()*3|0,0.5); try{i.dry();}catch(e){}
    const N=40, B=[]; for(let k=0;k<N;k++) B.push({x:Math.random()*GW,y:Math.random()*GH,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
    labStatus('An invisible flock drifts over the dried wash, re-wetting the paper as it goes — the pigment blooms along flight paths you never see.');
    function frame(t){
      for(const a of B){ let ax=0,ay=0,cx=0,cy=0,sx=0,sy=0,n=0;
        for(const o of B){ if(o===a)continue; const dx=o.x-a.x,dy=o.y-a.y,d2=dx*dx+dy*dy; if(d2<400){ cx+=o.x;cy+=o.y;ax+=o.vx;ay+=o.vy; if(d2<80){sx-=dx;sy-=dy;} n++; } }
        if(n){ cx/=n;cy/=n; a.vx+=(cx-a.x)*0.0008+ax/n*0.02+sx*0.002; a.vy+=(cy-a.y)*0.0008+ay/n*0.02+sy*0.002; }
        a.vx+=(Math.random()-0.5)*0.05; a.vy+=(Math.random()-0.5)*0.05;
        const sp=Math.hypot(a.vx,a.vy)||1, mx=0.85; if(sp>mx){ a.vx=a.vx/sp*mx; a.vy=a.vy/sp*mx; }
        a.x+=a.vx; a.y+=a.vy; if(a.x<0)a.x+=GW; if(a.x>=GW)a.x-=GW; if(a.y<0)a.y+=GH; if(a.y>=GH)a.y-=GH;
        i.grid.paint(a.x,a.y,3,WATER,0.18); }
    }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"memory", grp:"Autonomous", needs:"none", title:"Memory — a shape forgetting itself",
  note:"A simple form is painted from memory, but the fade spring is always erasing it, and each time the painter recalls the shape it returns a little more wrong. Over minutes the figure drifts out of true — present mostly as the trace of what it used to be.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.fadePainting(true);}catch(e){} pastel(i,0.35);
    const cx=GW/2, cy=GH/2, R=Math.min(GW,GH)*0.3, pts=[];
    for(let k=0;k<60;k++){ const a=k/60*6.2832; pts.push({x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R*0.8}); }
    let drift=0,last=-1e9;
    labStatus('A shape painted from memory: the fade keeps erasing it, and each recall returns slightly wrong, so the form slowly forgets itself.');
    function frame(t){ if(t-last>1500){ drift++; const j=drift*0.6; for(const p of pts) i.grid.paint(p.x+(Math.random()-0.5)*j, p.y+(Math.random()-0.5)*j, 3, drift%3, 0.4); last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },

];

// ---- shell ---------------------------------------------------------------
window.__LAB_BROWSER__ = true;                    // activates the loaders (browser only)
const enableBtn=document.getElementById('enable');
if(enableBtn) enableBtn.onclick=async()=>{ await enableMotion(); try{ window.__ac&&window.__ac.resume&&window.__ac.resume(); }catch(e){} enableBtn.hidden=true; };
document.addEventListener('pointerdown',()=>{ try{ window.__ac&&window.__ac.state==='suspended'&&window.__ac.resume(); }catch(e){} },{passive:true});
function manageMotion(scene){ if(!enableBtn)return; if(scene.needs==='tilt'){ if(needsMotionPermission()&&!_tilt.on){ enableBtn.hidden=false; } else { attachMotion(); enableBtn.hidden=true; } } else { enableBtn.hidden=true; } }
const stage=document.getElementById('stage'), list=document.getElementById('list');
const htitle=document.getElementById('htitle'), hnote=document.getElementById('hnote');
let active=null, raf=0, start=0;

function stop(){ if(raf)cancelAnimationFrame(raf); raf=0; if(active&&active.cleanup){try{active.cleanup();}catch(e){}} active=null; }
function run(scene,el){
  stop(); stage.innerHTML=''; labStatus('');
  [...list.children].forEach(c=>c.classList?.remove('on')); el&&el.classList.add('on');
  htitle.textContent=scene.title; hnote.textContent=scene.note;
  manageMotion(scene);
  try{ active=scene.build(stage); }catch(e){ labStatus('build error: '+e.message); return; }
  start=now();
  const loop=()=>{ raf=requestAnimationFrame(loop); try{ active&&active.frame&&active.frame(now()-start); }catch(e){ labStatus('frame error: '+e.message); } };
  raf=requestAnimationFrame(loop);
}
const groups=[...new Set(SCENES.map(s=>s.grp))];
for(const g of groups){ const h=document.createElement('div'); h.className='grp'; h.textContent=g; list.appendChild(h);
  for(const s of SCENES.filter(x=>x.grp===g)){ const el=document.createElement('div'); el.className='item';
    el.innerHTML='<span>'+s.title.split(' — ')[0]+'</span><span class="badge">'+s.needs+'</span>';
    el.title=s.title; el.onclick=()=>run(s,el); list.appendChild(el);
    if(!active && s===SCENES[0]) { /* defer first run until after list built */ } } }
run(SCENES[0], list.querySelector('.item'));
</script>
