<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Washes — Lab II — experimental</title>
<style>
  :root{ color-scheme:dark; --bg:#0e0f12; --panel:#16181d; --ink:#e8e6e1; --dim:#8b8a86; --line:#26282e; --accent:#c98b6e; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%}
  #app{display:grid;grid-template-columns:262px 1fr;height:100vh;background:var(--bg)}
  #side{border-right:1px solid var(--line);overflow-y:auto;padding:14px 0;background:var(--panel)}
  #side h1{font-size:15px;margin:0 16px 2px;letter-spacing:.02em}
  #side .sub{font-size:11.5px;color:var(--dim);margin:0 16px 12px}
  .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin:14px 16px 4px}
  .item{padding:7px 16px;cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;gap:7px}
  .item:hover{background:#1b1d23}
  .item.on{background:#1d2027;border-left-color:var(--accent);color:#fff}
  .item .badge{font-size:9px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:1px 5px;margin-left:auto;white-space:nowrap}
  #main{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  #hud{padding:13px 18px;border-bottom:1px solid var(--line);background:var(--bg)}
  #hud .t{font-size:15px;font-weight:600}
  #hud .n{font-size:12.5px;color:var(--dim);margin-top:3px;max-width:70ch}
  #labstatus{font-size:12px;color:var(--accent);margin-top:6px;min-height:1.2em}
  #enable{display:inline-block;margin-top:9px;background:var(--accent);color:#1a1207;border:0;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
  #enable[hidden]{display:none}
  #stagewrap{flex:1;display:flex;align-items:center;justify-content:center;padding:22px;min-height:0;background:radial-gradient(900px 600px at 50% 0,#15171c,#0e0f12)}
  #stage{width:min(78vmin,620px);height:min(78vmin,620px);background:#fff;border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,.5);overflow:hidden;position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
  #stage canvas{display:block;width:100%;height:100%}
  .foot{padding:8px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);background:var(--bg)}
  @media (max-width:760px){
    #app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    #side{border-right:0;border-bottom:1px solid var(--line);padding:8px 0;display:flex;flex-direction:column;gap:4px;max-height:none;background:var(--panel)}
    #side h1{margin:0 14px;font-size:14px} #side .sub{display:none}
    #list{display:flex;flex-direction:row;gap:6px;overflow-x:auto;padding:0 12px 4px;-webkit-overflow-scrolling:touch}
    .grp{display:none}
    .item{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;padding:7px 13px;background:#1d2027;color:var(--ink)}
    .item.on{background:#2a2118;border-color:var(--accent);color:#fff}
    #stagewrap{padding:12px} #stage{width:min(92vw,540px);height:min(92vw,540px)} #hud{padding:10px 14px}
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side">
    <h1>Washes — Lab · II</h1>
    <div class="sub">Ten experiments that delay, corrupt, withhold, and forget — the input never paints.</div>
    <div id="list"></div>
  </nav>
  <section id="main">
    <div id="hud"><div class="t" id="htitle">—</div><div class="n" id="hnote"></div><div id="labstatus"></div><button id="enable" hidden>Tap to enable motion</button></div>
    <div id="stagewrap"><div id="stage"></div></div>
    <div class="foot">Camera/mic/motion stay on your device and are used only while a scene runs. Each scene falls back to an autonomous mode if a sensor is unavailable.</div>
  </section>
</div>

<script src="../../engine/dist/washes.standalone.js"></script>

<script type="module">
// ---------------------------------------------------------------------------
// Helpers (shared) ----------------------------------------------------------
function newInst(host){const i=Washes.create(host,{gpu:false,pointer:false});const s=i.state();return {i,GW:s.gridWidth,GH:s.gridHeight};}
function canvasRect(host){const c=host&&host.querySelector&&host.querySelector('canvas');const r=(c||host).getBoundingClientRect();return {x:r.left,y:r.top,w:r.width||560,h:r.height||560};}
function wetPaper(i){try{const wp=i.paperWetnessPresets&&i.paperWetnessPresets();if(wp&&wp.length){const pick=wp.find(n=>/wet|flood|soak|damp/i.test(n))||wp[wp.length-1];i.paperWetness(pick);}}catch(e){}}
function bye(i){try{i.destroy();}catch(e){}}
function pastel(i,load){try{i.paintLoad(load==null?0.28:load);i.waterLoad(1.0);}catch(e){}try{i.fadePainting(true);}catch(e){}}
function labStatus(msg){const el=document.getElementById('labstatus');if(el)el.textContent=msg||'';}
const WATER=-1, MASK=-4;                          // verified negative brush indices

// Browser gate: set true only by the shell (below the marker), so the headless
// harness — which evaluates only helpers+scenes — sees it false and every
// loader degrades to the autonomous fallback instead of touching the network.
function inBrowser(){return typeof window!=='undefined' && !!window.__LAB_BROWSER__ && typeof navigator!=='undefined' && !!(navigator.mediaDevices);}

const THREE_URL='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
const VISION_URL='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';
const WASM_URL='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm';
const HAND_MODEL='https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task';
const FACE_MODEL='https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';

let _three,_threeTried;
async function loadThree(){ if(!inBrowser())return null; if(_threeTried)return _three; _threeTried=1; try{_three=await import(THREE_URL);}catch(e){_three=null;} return _three; }
let _vision,_visionTried;
async function loadVision(){ if(!inBrowser())return null; if(_visionTried)return _vision; _visionTried=1; try{_vision=await import(VISION_URL);}catch(e){_vision=null;} return _vision; }
async function getCamera(){ if(!inBrowser())return null; try{ const s=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}}); const v=document.createElement('video'); v.muted=true;v.playsInline=true;v.autoplay=true;v.srcObject=s;v.__stream=s; await (v.play?v.play().catch(()=>{}):0); return v; }catch(e){ return null; } }
async function makeHand(){ const V=await loadVision(); if(!V)return null; try{ const fs=await V.FilesetResolver.forVisionTasks(WASM_URL); return await V.HandLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:HAND_MODEL,delegate:'GPU'},numHands:1,runningMode:'VIDEO'}); }catch(e){ return null; } }
async function makeFace(){ const V=await loadVision(); if(!V)return null; try{ const fs=await V.FilesetResolver.forVisionTasks(WASM_URL); return await V.FaceLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:FACE_MODEL,delegate:'GPU'},outputFaceBlendshapes:true,runningMode:'VIDEO',numFaces:1}); }catch(e){ return null; } }
async function getMic(){ if(!inBrowser())return null; try{ const s=await navigator.mediaDevices.getUserMedia({audio:true}); const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC(); if(ac.state==='suspended'){ try{ await ac.resume(); }catch(e){} } window.__ac=ac; const src=ac.createMediaStreamSource(s); const an=ac.createAnalyser(); an.fftSize=1024; src.connect(an); return {an,ac,stream:s,buf:new Uint8Array(an.frequencyBinCount)}; }catch(e){ return null; } }
function stopTracks(v){ try{ const s=v&&(v.__stream||v.srcObject); if(s&&s.getTracks)s.getTracks().forEach(t=>t.stop()); }catch(e){} }
function now(){ return (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now(); }
const _tilt={g:0,b:0,on:false};
function getTilt(){ return _tilt; }
function tiltSupported(){ return inBrowser() && typeof window.DeviceOrientationEvent!=='undefined'; }
function needsMotionPermission(){ return tiltSupported() && typeof window.DeviceOrientationEvent.requestPermission==='function'; }
function attachMotion(){ if(_tilt.on||!tiltSupported())return; _tilt.on=true; try{ window.addEventListener('deviceorientation',e=>{ _tilt.g=e.gamma||0; _tilt.b=e.beta||0; }); }catch(e){} }
async function enableMotion(){ if(!tiltSupported())return false; try{ if(needsMotionPermission()){ const r=await window.DeviceOrientationEvent.requestPermission(); if(r!=='granted')return false; } attachMotion(); return true; }catch(e){ return false; } }

// ---- scenes ---------------------------------------------------------------
// Each scene: build(host) -> { frame(elapsedMs), cleanup() }.
// Thesis: the sensor bends the medium's physics (gravity, wetness, masking,
// dilution) — it is never a brush. State is created synchronously; async init
// fills it in when ready; frame() is always safe and degrades to autonomy.
const SCENES = [

// ===================== CAMERA & BODY =====================
{ id:"undertow", grp:"Camera & body", needs:"camera", title:"Undertow — painted by your past self",
  note:"The camera watches your motion but nothing responds now. Every gesture is recorded and held for about eight seconds, then released into the water, so the wash is always being stirred by the you of a few seconds ago. You cannot correct it in time; you can only haunt it.",
  build(host){ const {i,GW,GH}=newInst(host);
    for(let k=0;k<520;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,7,Math.random()*3|0,0.5); try{i.dry();}catch(e){}
    const DELAY=240, buf=[]; for(let k=0;k<DELAY;k++) buf.push(null);
    const st={video:null,prev:null,octx:null,dead:false}; let auto=0;
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — the undertow runs on a delayed drift. Allow the webcam to feed it your past motion.');return;}
      st.video=v; const oc=document.createElement('canvas'); oc.width=48; oc.height=36; st.octx=oc.getContext('2d',{willReadFrequently:true});
      labStatus('Move in front of the camera — what you do now reaches the water about eight seconds later.'); })();
    function sample(){ if(!(st.video&&st.octx&&st.video.readyState>=2)) return null; const W=48,H=36;
      try{st.octx.drawImage(st.video,0,0,W,H);}catch(e){return null;} let d; try{d=st.octx.getImageData(0,0,W,H).data;}catch(e){return null;}
      const cur=new Float32Array(W*H); for(let p=0;p<W*H;p++) cur[p]=(d[p*4]+d[p*4+1]+d[p*4+2])/765; let out=null;
      if(st.prev){ const pts=[]; let cxs=0,cys=0,m=0;
        for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const idx=y*W+x, mv=Math.abs(cur[idx]-st.prev[idx]); if(mv>0.12){ pts.push({x:(1-x/W)*GW,y:y/H*GH,m:Math.min(0.5,mv)}); cxs+=x;cys+=y;m++; } }
        if(pts.length){ const ax=(1-(cxs/m)/W)-0.5, ay=(cys/m)/H-0.5; out={dir:Math.abs(ax)>Math.abs(ay)?(ax>0?'right':'left'):(ay>0?'down':'up'), str:Math.min(0.12,m*0.004), pts}; } }
      st.prev=cur; return out; }
    function frame(t){ let sm=sample();
      if(!st.video){ auto++; if(auto%6===0){ sm={dir:['down','left','up','right'][(auto/30|0)%4], str:0.05, pts:[{x:GW*(0.5+0.4*Math.sin(t*0.0007)),y:GH*(0.5+0.4*Math.cos(t*0.0005)),m:0.25}]}; } else sm=null; }
      buf.push(sm); const past=buf.shift();
      if(past){ for(const p of past.pts) i.grid.paint(p.x,p.y,Math.max(3,GW*0.03),WATER,p.m); try{i.gravityDirection(past.dir);i.gravityStrength(past.str);}catch(e){} }
      else { try{i.gravityStrength(0);}catch(e){} } }
    return { frame, cleanup(){ st.dead=true; stopTracks(st.video); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"contrapposto", grp:"Camera & body", needs:"hand", title:"Contrapposto — only motion counts",
  note:"A still hand does nothing, no matter how you hold it. The wash answers only to how fast your hand moves, and it pours in the direction you are leaving — a wake, not a push. An open hand glides; a clenched fist drags violently. Position is meaningless; only change has force.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<140;k++){ const a=Math.random()*6.2832, rr=Math.sqrt(Math.random())*GW*0.13; i.grid.paint(GW*0.5+Math.cos(a)*rr,GH*0.5+Math.sin(a)*rr,5,k%3,0.6); }
    const st={video:null,hand:null,dead:false,px:null,py:null};
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — it drifts on changing currents. Allow the webcam: only moving your hand has any effect.');return;}
      st.video=v; const hl=await makeHand(); if(st.dead){try{hl&&hl.close();}catch(e){}stopTracks(v);return;} if(!hl){labStatus('Hand tracking unavailable — drifting on its own.');return;}
      st.hand=hl; labStatus('Hold still and nothing happens. Move your hand and the wash flows in your wake — gently if open, harshly in a fist.'); })();
    function frame(t){
      if(st.hand&&st.video&&st.video.readyState>=2){ let res; try{res=st.hand.detectForVideo(st.video,now());}catch(e){res=null;} const lm=res&&res.landmarks&&res.landmarks[0];
        if(lm){ const wrist=lm[0], mid=lm[9]; const cx=1-(wrist.x+mid.x)/2, cy=(wrist.y+mid.y)/2;
          if(st.px!=null){ const vx=cx-st.px, vy=cy-st.py, sp=Math.hypot(vx,vy);
            if(sp>0.012){ const dir=Math.abs(vx)>Math.abs(vy)?(vx>0?'left':'right'):(vy>0?'up':'down'); let open=0; for(const ti of [4,8,12,16,20]) open+=Math.hypot(lm[ti].x-wrist.x,lm[ti].y-wrist.y); open/=5;
              const fist=Math.max(0,1-(open/0.18)), str=Math.min(0.22,sp*(0.6+fist*3.0)); try{i.gravityDirection(dir);i.gravityStrength(str);}catch(e){} }
            else { try{i.gravityStrength(0);}catch(e){} } } st.px=cx; st.py=cy; }
        else { try{i.gravityStrength(0);}catch(e){} } }
      else { const sp=0.5*(0.5+0.5*Math.sin(t*0.0013)), dir=['left','up','right','down'][(t*0.0003|0)%4]; try{i.gravityDirection(dir);i.gravityStrength(0.02+sp*0.08);}catch(e){} }
    }
    return { frame, cleanup(){ st.dead=true; try{st.hand&&st.hand.close();}catch(e){} stopTracks(st.video); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"apparition", grp:"Camera & body", needs:"face", title:"Apparition — summoned only when unseen",
  note:"There is a hidden figure on the page, but it can only be drawn in the instants your eyes are closed. Each blink adds a little more and nothing here ever fades, so over many blinks you slowly, permanently call up an image you are structurally unable to watch arrive. When it is done it is the one thing you never saw appear.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const pts=[]; const cx=GW*0.5, cy=GH*0.52, R=Math.min(GW,GH)*0.30;
    for(let k=0;k<160;k++){ const a=k/160*6.2832*3, rr=R*(0.2+0.8*k/160); pts.push({x:cx+Math.cos(a)*rr,y:cy+Math.sin(a)*rr*0.92, p:k%3}); }
    const st={video:null,face:null,dead:false,idx:0};
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — the figure accretes on a slow pulse. Allow the webcam: it only draws while your eyes are closed.');return;}
      st.video=v; const fl=await makeFace(); if(st.dead){try{fl&&fl.close();}catch(e){}stopTracks(v);return;} if(!fl){labStatus('Face tracking unavailable — accreting on its own.');return;}
      st.face=fl; labStatus('Close your eyes to let it draw; open them and it stops. It never erases — what appears in the dark, stays.'); })();
    function reveal(n){ for(let k=0;k<n && st.idx<pts.length;k++){ const p=pts[st.idx++]; i.grid.paint(p.x,p.y,4,p.p,0.5); } }
    function frame(t){
      if(st.face&&st.video&&st.video.readyState>=2){ let res; try{res=st.face.detectForVideo(st.video,now());}catch(e){res=null;}
        const bs=res&&res.faceBlendshapes&&res.faceBlendshapes[0]&&res.faceBlendshapes[0].categories;
        if(bs){ const g=n=>{const c=bs.find(c=>c.categoryName===n);return c?c.score:0;}; if((g('eyeBlinkLeft')+g('eyeBlinkRight'))/2>0.55) reveal(1); } }
      else { if((t/220|0)%2===0) reveal(1); }
    }
    return { frame, cleanup(){ st.dead=true; try{st.face&&st.face.close();}catch(e){} stopTracks(st.video); bye(i); } };
  } },

{ id:"aphasia", grp:"Camera & body", needs:"hand", title:"Aphasia — pinch to lose the words",
  note:"A painter is trying to lay an ordered sequence of colour. Your pinch sets how much the medium can still keep things straight: spread your fingers and it stays lucid and faithful; pinch them together and it forgets — colours land in the wrong place, the paint thins, and the fade begins wiping it away as fast as it arrives.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const st={video:null,hand:null,dead:false,coh:1}; let seq=0,last=-1e9;
    (async()=>{ const v=await getCamera(); if(st.dead){stopTracks(v);return;} if(!v){labStatus('No camera — coherence drifts on a sine. Allow the webcam to set it by pinching.');return;}
      st.video=v; const hl=await makeHand(); if(st.dead){try{hl&&hl.close();}catch(e){}stopTracks(v);return;} if(!hl){labStatus('Hand tracking unavailable.');return;}
      st.hand=hl; labStatus('Spread your fingers to keep it lucid; pinch to make the painting forget where its colours belong.'); })();
    function frame(t){
      if(st.hand&&st.video&&st.video.readyState>=2){ let res; try{res=st.hand.detectForVideo(st.video,now());}catch(e){res=null;} const lm=res&&res.landmarks&&res.landmarks[0];
        if(lm){ const d=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y); st.coh=Math.min(1,Math.max(0,(d-0.03)*4)); } }
      else { st.coh=0.5+0.5*Math.sin(t*0.0005); }
      try{i.fadePainting(st.coh<0.55);}catch(e){} try{i.paintLoad(0.12+st.coh*0.6);}catch(e){}
      if(t-last>80){ seq++; last=t; const ordered=seq%3, pig=(Math.random()<st.coh)?ordered:(Math.random()*3|0), jitter=(1-st.coh)*GW*0.22;
        const x=GW*(0.5+0.33*Math.sin(seq*0.5))+(Math.random()-0.5)*jitter, y=GH*(0.5+0.33*Math.cos(seq*0.4))+(Math.random()-0.5)*jitter; i.grid.paint(x,y,GW*0.05,pig,0.5); }
    }
    return { frame, cleanup(){ st.dead=true; try{st.hand&&st.hand.close();}catch(e){} stopTracks(st.video); bye(i); } };
  } },

// ===================== 3D / three.js =====================
{ id:"penumbra", grp:"3D / three.js", needs:"three.js", title:"Penumbra — a cross-section of something larger",
  note:"You are only allowed to see a narrow horizontal slit. A three.js shadow rises and falls behind the sheet and drags the whole wash slowly up or down past that slit, so what you watch is a moving cross-section of a composition you never see whole. The painting is mostly off-stage, on purpose.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let b=0;b<14;b++){ const yy=GH*(b+0.5)/14; for(let x=2;x<GW;x+=3) i.grid.paint(x,yy,5,b%3,0.5); }
    const bar1=document.createElement('div'), bar2=document.createElement('div');
    bar1.style.position='absolute';bar1.style.left='0';bar1.style.right='0';bar1.style.top='0';bar1.style.height='42%';bar1.style.background='#0e0f12';bar1.style.zIndex='5';bar1.style.pointerEvents='none';
    bar2.style.position='absolute';bar2.style.left='0';bar2.style.right='0';bar2.style.bottom='0';bar2.style.height='42%';bar2.style.background='#0e0f12';bar2.style.zIndex='5';bar2.style.pointerEvents='none';
    try{ host.appendChild(bar1); host.appendChild(bar2); }catch(e){}
    const st={rend:null,scene:null,cam:null,light:null,octx:null,dead:false};
    (async()=>{ const T=await loadThree(); if(st.dead)return; if(!T){labStatus('three.js unavailable — the slit scrolls on a slow tide.');return;}
      try{ const sc=new T.Scene(); const cam=new T.PerspectiveCamera(50,1,0.1,100); cam.position.set(0,0,6);
        const rend=new T.WebGLRenderer({antialias:false,preserveDrawingBuffer:true}); rend.setSize(16,16);
        sc.add(new T.Mesh(new T.PlaneGeometry(9,9), new T.MeshStandardMaterial({color:0xffffff,roughness:1})));
        const light=new T.PointLight(0xffffff,40,60); sc.add(light); sc.add(new T.AmbientLight(0x101010));
        const oc=document.createElement('canvas'); oc.width=16; oc.height=16; const octx=oc.getContext('2d',{willReadFrequently:true});
        st.rend=rend;st.scene=sc;st.cam=cam;st.light=light;st.octx=octx;
        labStatus('A 3D shadow drags the hidden composition up and down past the slit you are allowed to see.'); }
      catch(e){ st.rend=null; labStatus('three.js init failed — the slit scrolls on a slow tide.'); } })();
    function frame(t){ let lift=Math.sin(t*0.0004);
      if(st.rend){ const ang=t*0.0005; st.light.position.set(Math.cos(ang)*5,Math.sin(ang)*5,3);
        try{ st.rend.render(st.scene,st.cam); st.octx.drawImage(st.rend.domElement,0,0,16,16); const d=st.octx.getImageData(0,0,16,16).data; let top=0,bot=0; for(let x=0;x<16;x++){ top+=d[(2*16+x)*4]; bot+=d[(13*16+x)*4]; } lift=(top-bot)/(255*16); }catch(e){} }
      const dir=lift>0?'up':'down'; try{i.gravityDirection(dir);i.gravityStrength(Math.min(0.16,Math.abs(lift)*0.18+0.02));}catch(e){} }
    return { frame, cleanup(){ st.dead=true; try{host.removeChild(bar1);host.removeChild(bar2);}catch(e){} try{i.gravityStrength(0);}catch(e){} try{st.rend&&st.rend.dispose&&st.rend.dispose();}catch(e){} bye(i); } };
  } },

{ id:"pentimento", grp:"3D / three.js", needs:"three.js", title:"Pentimento — earlier forms show through",
  note:"A 3D solid keeps changing its mind about what it is, cycling through different shapes. Each masks the paint that floods around it, but nothing fades — so when the form becomes something else the old silhouette stays as a dried ghost. What accumulates is an X-ray: every shape the object used to be, layered into one.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const GW2=Math.min(GW,GH);
    const st={rend:null,scene:null,cam:null,mesh:null,geoms:null,octx:null,dead:false,N:26,gi:0}; let last=-1e9,pig=0,morph=-1e9;
    (async()=>{ const T=await loadThree(); if(st.dead)return; if(!T){labStatus('three.js unavailable — analytic forms cycle instead.');return;}
      try{ const sc=new T.Scene(); const cam=new T.PerspectiveCamera(45,1,0.1,100); cam.position.set(0,0,5);
        const rend=new T.WebGLRenderer({antialias:false,preserveDrawingBuffer:true,alpha:true}); rend.setSize(st.N,st.N);
        const geoms=[new T.TorusKnotGeometry(1,0.34,64,10), new T.IcosahedronGeometry(1.35,0), new T.TorusGeometry(1.1,0.45,10,24), new T.BoxGeometry(1.8,1.8,1.8), new T.ConeGeometry(1.3,2.2,20)];
        const mesh=new T.Mesh(geoms[0], new T.MeshBasicMaterial({color:0xffffff})); sc.add(mesh);
        const oc=document.createElement('canvas'); oc.width=st.N; oc.height=st.N; const octx=oc.getContext('2d',{willReadFrequently:true});
        st.rend=rend;st.scene=sc;st.cam=cam;st.mesh=mesh;st.geoms=geoms;st.octx=octx;
        labStatus('A hidden solid keeps changing shape; the wash floods around each one and the old outlines never wash away.'); }
      catch(e){ st.rend=null; labStatus('three.js init failed — analytic forms cycle instead.'); } })();
    function maskGrid(g,N){ try{ const {w:DW,h:DH}=canvasRect(host); i.removeMask(); for(let y=0;y<N;y++)for(let x=0;x<N;x++){ if(g[y*N+x]>0.4) i.mask(x/N,y/N,1/N+1/DW,1/N+1/DH,0); } }catch(e){} }
    function frame(t){
      if(st.rend && t-morph>9000){ morph=t; st.gi=(st.gi+1)%st.geoms.length; try{st.mesh.geometry=st.geoms[st.gi];}catch(e){} }
      if(t-last<150) return; last=t; pig=(pig+1)%3; let g=null, N=st.N;
      if(st.rend){ st.mesh.rotation.x=t*0.0004; st.mesh.rotation.y=t*0.0006;
        try{ st.rend.render(st.scene,st.cam); st.octx.clearRect(0,0,N,N); st.octx.drawImage(st.rend.domElement,0,0,N,N); const d=st.octx.getImageData(0,0,N,N).data; g=new Float32Array(N*N); for(let p=0;p<N*N;p++) g[p]=(d[p*4]+d[p*4+1]+d[p*4+2])/765; }catch(e){ g=null; } }
      if(!g){ const phase=(t/9000|0)%3, cx=N/2+Math.cos(t*0.0006)*N*0.16, cy=N/2+Math.sin(t*0.0006)*N*0.16; g=new Float32Array(N*N);
        for(let y=0;y<N;y++)for(let x=0;x<N;x++){ const dx=x-cx,dy=y-cy; let inside; if(phase===0) inside=Math.hypot(dx,dy)<N*0.22; else if(phase===1) inside=(Math.abs(dx)+Math.abs(dy))<N*0.26; else inside=Math.max(Math.abs(dx),Math.abs(dy))<N*0.2; g[y*N+x]=inside?1:0; } }
      maskGrid(g,N); for(let k=0;k<80;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,GW2*0.03,pig,0.16);
    }
    return { frame, cleanup(){ st.dead=true; try{i.removeMask();}catch(e){} try{st.rend&&st.rend.dispose&&st.rend.dispose();}catch(e){} bye(i); } };
  } },

// ===================== SENSORS & SOUND =====================
{ id:"aftershock", grp:"Sensors & sound", needs:"tilt", title:"Aftershock — long calm, sudden slip",
  note:"Almost nothing happens. The piece sits still and quietly accumulates the energy of every tilt or drag without acting on it. Only when enough has built up does it let go all at once — a single violent avalanche of pigment in the direction it had been leaning — and then it resets to stillness and begins storing again.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let gx=4;gx<GW;gx+=2) i.grid.paint(gx,GH*0.14,4,gx%3,0.6);
    const st={dead:false,g:0,b:0,E:0,dir:'down',burst:0};
    function onPointer(e){ const r=host.getBoundingClientRect(); st.g=((e.clientX-r.left)/(r.width||560)-0.5)*90; st.b=((e.clientY-r.top)/(r.height||560)-0.5)*90; }
    const cv=host.querySelector('canvas'); if(cv) cv.addEventListener('pointermove',onPointer);
    labStatus('Tilt your phone or drag — nothing moves at first. Pressure builds until it slips all at once, then the calm returns.');
    let pg=0,pb=0;
    function frame(t){ const tl=getTilt(); if(tl.on){ st.g=tl.g; st.b=tl.b; }
      const dg=Math.abs(st.g-pg)+Math.abs(st.b-pb); pg=st.g; pb=st.b;
      const ax=st.g/45, ay=st.b/45; if(Math.hypot(ax,ay)>0.05){ st.dir=Math.abs(ax)>Math.abs(ay)?(ax>0?'right':'left'):(ay>0?'down':'up'); }
      if(st.burst>0){ st.burst--; try{i.gravityStrength(0.22);i.gravityDirection(st.dir);}catch(e){} if(st.burst%4===0){ for(let k=0;k<6;k++) i.grid.paint(Math.random()*GW,GH*0.1+Math.random()*GH*0.2,GW*0.05,WATER,0.3);} return; }
      st.E += dg*0.02 + 0.0008; if(st.E>1){ st.E=0; st.burst=45; } try{i.gravityStrength(0);}catch(e){} }
    return { frame, cleanup(){ st.dead=true; if(cv)cv.removeEventListener('pointermove',onPointer); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"sympathetic", grp:"Sensors & sound", needs:"mic", title:"Sympathetic — the room tunes the colour",
  note:"Not loudness — pitch. The piece listens to the overall tone of the room and uses it to decide which single colour is allowed to move: low sounds free the blue, midrange the rose, bright sounds the yellow. The other two stay frozen, and silence locks all three. You conduct it less by performing than by changing the air.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let band=0;band<3;band++){ const y0=GH*band/3; for(let k=0;k<200;k++) i.grid.paint(Math.random()*GW, y0+Math.random()*GH/3, 6, band===0?2:band===1?0:1, 0.4); }
    const st={mic:null,dead:false,active:-2};
    function lock(idx){ if(idx===st.active)return; st.active=idx; try{ const {h:DH}=canvasRect(host); i.removeMask(); for(let band=0;band<3;band++){ if(band!==idx) i.mask(0, band/3, 1, 1/3+1/DH, 0); } i.maskTint(true); }catch(e){} }
    (async()=>{ const m=await getMic(); if(st.dead){try{m&&m.ac.close();}catch(e){}return;} if(!m){labStatus('No microphone — the tuning drifts on its own. Allow the mic: pitch chooses which colour breathes.');return;}
      st.mic=m; labStatus('Low tones free the blue, mid tones the rose, bright tones the yellow; silence locks them all.'); })();
    function frame(t){ let idx=-1;
      if(st.mic){ st.mic.an.getByteFrequencyData(st.mic.buf); let s=0,ws=0; for(let k=0;k<st.mic.buf.length;k++){ s+=st.mic.buf[k]; ws+=k*st.mic.buf[k]; } if(s>4*st.mic.buf.length){ const c=(ws/s)/st.mic.buf.length; idx=c<0.18?0:c<0.42?1:2; } else idx=-1; }
      else { const ph=(t/2500|0)%4; idx=ph===3?-1:ph; }
      lock(idx); if(idx>=0){ const y0=GH*idx/3; for(let k=0;k<3;k++) i.grid.paint(Math.random()*GW, y0+Math.random()*GH/3, GW*0.04, WATER, 0.12); }
    }
    return { frame, cleanup(){ st.dead=true; try{ st.mic&&st.mic.ac.close(); st.mic&&st.mic.stream.getTracks().forEach(t=>t.stop()); }catch(e){} try{i.removeMask();}catch(e){} bye(i); } };
  } },

// ===================== AUTONOMOUS =====================
{ id:"sedimentation", grp:"Autonomous", needs:"none", title:"Sedimentation — it fills, then stops",
  note:"An invisible flock re-wets a dried wash as it drifts, but each agent is repelled by ground it has already soaked — so it is forced into the few remaining dry regions, filling the sheet by avoidance. As the empty space runs out the flock has nowhere left to go, slows, and finally settles. The piece completes itself.",
  build(host){ const {i,GW,GH}=newInst(host);
    for(let k=0;k<620;k++) i.grid.paint(Math.random()*GW,Math.random()*GH,6,Math.random()*3|0,0.5); try{i.dry();}catch(e){}
    const M=40, vis=new Float32Array(M*M); const N=34, B=[]; for(let k=0;k<N;k++) B.push({x:Math.random()*GW,y:Math.random()*GH,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
    function sample(x,y){ const mx=Math.min(M-1,Math.max(0,x/GW*M|0)), my=Math.min(M-1,Math.max(0,y/GH*M|0)); return vis[my*M+mx]; }
    labStatus('An invisible flock blooms the dried wash but flees wherever it has already been, filling the gaps until it runs out of room and stops.');
    function frame(t){ for(const a of B){ const e=0.06*GW, gx=(sample(a.x+e,a.y)-sample(a.x-e,a.y)), gy=(sample(a.x,a.y+e)-sample(a.x,a.y-e));
        a.vx-=gx*0.5; a.vy-=gy*0.5; a.vx+=(Math.random()-0.5)*0.08; a.vy+=(Math.random()-0.5)*0.08;
        const sp=Math.hypot(a.vx,a.vy)||1, mx=0.9; if(sp>mx){a.vx=a.vx/sp*mx;a.vy=a.vy/sp*mx;}
        a.x+=a.vx; a.y+=a.vy; if(a.x<0)a.x+=GW; if(a.x>=GW)a.x-=GW; if(a.y<0)a.y+=GH; if(a.y>=GH)a.y-=GH;
        const mxi=Math.min(M-1,a.x/GW*M|0), myi=Math.min(M-1,a.y/GH*M|0); vis[myi*M+mxi]=Math.min(2,vis[myi*M+mxi]+0.03);
        i.grid.paint(a.x,a.y,3,WATER,0.16); } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"confabulation", grp:"Autonomous", needs:"none", title:"Confabulation — a shape that misremembers itself",
  note:"There is no original. The form begins as noise, and every recall repaints not the first shape but the last one, plus a little error — a game of telephone with itself. The fade keeps only the most recent guess visible, so you watch a figure invent itself out of nothing and then drift away from whatever it had just become.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.fadePainting(true);}catch(e){} pastel(i,0.35);
    const cx=GW/2, cy=GH/2, R=Math.min(GW,GH)*0.28, M=70, belief=[];
    for(let k=0;k<M;k++){ const a=k/M*6.2832; belief.push({x:cx+Math.cos(a)*R+(Math.random()-0.5)*R, y:cy+Math.sin(a)*R+(Math.random()-0.5)*R}); }
    let last=-1e9,gen=0;
    labStatus('No original — the shape recalls its own last guess plus a little error each time, inventing itself out of noise and drifting on.');
    function frame(t){ if(t-last>1300){ last=t; gen++;
      for(let k=0;k<M;k++){ belief[k].x+=(Math.random()-0.5)*GW*0.02; belief[k].y+=(Math.random()-0.5)*GH*0.02;
        const n=belief[(k+1)%M], p=belief[(k+M-1)%M]; belief[k].x+=((n.x+p.x)/2-belief[k].x)*0.06; belief[k].y+=((n.y+p.y)/2-belief[k].y)*0.06;
        belief[k].x=Math.max(2,Math.min(GW-2,belief[k].x)); belief[k].y=Math.max(2,Math.min(GH-2,belief[k].y));
        i.grid.paint(belief[k].x,belief[k].y,3,gen%3,0.42); } } }
    return { frame, cleanup(){ bye(i); } };
  } },

];

// ---- shell ---------------------------------------------------------------
window.__LAB_BROWSER__ = true;                    // activates the loaders (browser only)
const enableBtn=document.getElementById('enable');
if(enableBtn) enableBtn.onclick=async()=>{ await enableMotion(); try{ window.__ac&&window.__ac.resume&&window.__ac.resume(); }catch(e){} enableBtn.hidden=true; };
document.addEventListener('pointerdown',()=>{ try{ window.__ac&&window.__ac.state==='suspended'&&window.__ac.resume(); }catch(e){} },{passive:true});
function manageMotion(scene){ if(!enableBtn)return; if(scene.needs==='tilt'){ if(needsMotionPermission()&&!_tilt.on){ enableBtn.hidden=false; } else { attachMotion(); enableBtn.hidden=true; } } else { enableBtn.hidden=true; } }
const stage=document.getElementById('stage'), list=document.getElementById('list');
const htitle=document.getElementById('htitle'), hnote=document.getElementById('hnote');
let active=null, raf=0, start=0;

function stop(){ if(raf)cancelAnimationFrame(raf); raf=0; if(active&&active.cleanup){try{active.cleanup();}catch(e){}} active=null; }
function run(scene,el){
  stop(); stage.innerHTML=''; labStatus('');
  [...list.children].forEach(c=>c.classList?.remove('on')); el&&el.classList.add('on');
  htitle.textContent=scene.title; hnote.textContent=scene.note;
  manageMotion(scene);
  try{ active=scene.build(stage); }catch(e){ labStatus('build error: '+e.message); return; }
  start=now();
  const loop=()=>{ raf=requestAnimationFrame(loop); try{ active&&active.frame&&active.frame(now()-start); }catch(e){ labStatus('frame error: '+e.message); } };
  raf=requestAnimationFrame(loop);
}
const groups=[...new Set(SCENES.map(s=>s.grp))];
for(const g of groups){ const h=document.createElement('div'); h.className='grp'; h.textContent=g; list.appendChild(h);
  for(const s of SCENES.filter(x=>x.grp===g)){ const el=document.createElement('div'); el.className='item';
    el.innerHTML='<span>'+s.title.split(' — ')[0]+'</span><span class="badge">'+s.needs+'</span>';
    el.title=s.title; el.onclick=()=>run(s,el); list.appendChild(el);
    if(!active && s===SCENES[0]) { /* defer first run until after list built */ } } }
run(SCENES[0], list.querySelector('.item'));
</script>
