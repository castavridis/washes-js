<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Washes — demo gallery (v1.0.1)</title>
<style>
  :root{ --ink:#1c1917; --muted:#7c7268; --line:#e7e2da; --panel:#f7f3ec; --bg:#efe9e0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:13.5px/1.45 ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.02em}
  header .v{color:var(--muted);font-size:11px}
  #app{flex:1;display:flex;min-height:0}
  nav{width:236px;border-right:1px solid var(--line);overflow:auto;padding:10px 8px;background:var(--panel)}
  nav .grp{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin:12px 8px 4px}
  nav button{display:block;width:100%;text-align:left;border:0;background:none;color:var(--ink);
              font:inherit;padding:6px 9px;border-radius:7px;cursor:pointer}
  nav button:hover{background:#0000000c}
  nav button[aria-current="true"]{background:#1c1917;color:#fff}
  main{flex:1;display:flex;flex-direction:column;min-width:0;padding:16px;gap:12px}
  #stagewrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative}
  #stage{position:relative;width:min(76vmin,560px);height:min(76vmin,560px);border-radius:10px;overflow:hidden;
         background:#fff;box-shadow:0 10px 40px -14px #0007,0 0 0 1px var(--line)}
  #hud{position:absolute;top:8px;right:10px;font-size:11px;color:#1c1917cc;background:#ffffffb0;
       padding:3px 7px;border-radius:6px;pointer-events:none}
  #meta{flex:0 0 auto}
  #meta h2{margin:0 0 3px;font-size:14px;font-weight:600}
  #meta p{margin:0;color:var(--muted);max-width:62ch;font-size:12px;line-height:1.5}
</style>
</head>
<body>
  <header><h1>Washes — demo gallery</h1><span class="v">v1.0.1 · CPU engine · pick a demo →</span></header>
  <div id="app">
    <nav id="menu"></nav>
    <main>
      <div id="stagewrap"><div id="stage"></div><div id="hud"></div></div>
      <div id="meta"><h2 id="sTitle"></h2><p id="sNote"></p></div>
    </main>
  </div>

<!-- ===== Washes engine (folded v1.0.1; GPU opt-in → gallery runs CPU) ===== -->
<script src="../../engine/dist/washes.standalone.js"></script>

<!-- ===== gallery shell + 14 scenes ===== -->
<script type="module">
const Washes = window.Washes;

// ---- helpers --------------------------------------------------------------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function newInst(host){const i=Washes.compat1(Washes.create(host,{gpu:false}));const s=i.state();return {i,GW:s.gridWidth,GH:s.gridHeight};}
function wetPaper(i){try{const wp=i.paperWetnessPresets&&i.paperWetnessPresets();if(wp&&wp.length){const pick=wp.find(n=>/wet|flood|soak|damp/i.test(n))||wp[wp.length-1];i.paperWetness(pick);}}catch(e){}}
function bye(i){try{i.destroy();}catch(e){}}
function paper(i,hex){try{const n=parseInt(hex.slice(1),16);i.paperColor(((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255);}catch(e){}}
function pastel(i,load){try{i.paintLoad(load==null?0.28:load);i.waterLoad(1.0);}catch(e){}try{i.fadePainting(true);}catch(e){}}

// ---- scenes ---------------------------------------------------------------
// Each scene: build(host) -> { frame(elapsedMs), cleanup() }.
const SCENES = [

// ===================== STUDIES (the four requests) =====================
{ id:"torus", grp:"Studies", title:"Torus rotating in space",
  note:"A parametric torus sampled into points, rotated each frame about two axes and orthographically projected. fadePainting() leaves a watercolor motion-trail; front points paint blue, back points rose.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.fadePainting(true);}catch(e){}
    const cx=GW/2, cy=GH/2, R=Math.min(GW,GH)*0.27, r=R*0.42, US=22, VS=10;
    function frame(t){ const a=t*0.0006, b=t*0.0009, ca=Math.cos(a),sa=Math.sin(a),cb=Math.cos(b),sb=Math.sin(b);
      for(let iu=0;iu<US;iu++)for(let iv=0;iv<VS;iv++){
        const u=iu/US*6.2832, v=iv/VS*6.2832, cu=Math.cos(u),su=Math.sin(u),cv=Math.cos(v);
        let x=(R+r*cv)*cu, y=(R+r*cv)*su, z=r*Math.sin(v);
        let y1=y*ca-z*sa, z1=y*sa+z*ca; y=y1; z=z1;
        let x1=x*cb+z*sb, z2=-x*sb+z*cb; x=x1; z=z2;
        if(z<0) continue;                       // front-facing only
        const gx=cx+x, gy=cy+y; if(gx<1||gx>GW-1||gy<1||gy>GH-1) continue;
        const depth=(z+r)/(2*r);
        i.paintAt(gx,gy,1.4+depth*1.6, depth>0.5?2:0, 0.25+depth*0.45);
      } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"regression", grp:"Studies", title:"Linear regression over time",
  note:"Random points (y = m·x + b + noise) reveal one by one as blue dabs. Each frame the least-squares fit is recomputed from the points shown so far and the rose regression line is repainted, so the line settles toward the true slope as data accumulates.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.fadePainting(true);}catch(e){}
    const rng=mulberry32(7), N=42, m=(rng()*2-1)*0.7, b=GH*(0.3+rng()*0.4), pts=[];
    for(let k=0;k<N;k++){const x=rng()*GW; let y=m*x+b+(rng()*2-1)*GH*0.13; pts.push({x,y:Math.max(2,Math.min(GH-2,y))});}
    let shown=0,last=-1e9;
    function frame(t){
      if(t-last>160 && shown<N){ const p=pts[shown++]; i.paintAt(p.x,p.y,2.4,2,0.85); last=t; }
      if(shown>=2){ let sx=0,sy=0,sxx=0,sxy=0,n=shown; for(let k=0;k<n;k++){const p=pts[k];sx+=p.x;sy+=p.y;sxx+=p.x*p.x;sxy+=p.x*p.y;}
        const den=n*sxx-sx*sx||1e-6, mm=(n*sxy-sx*sy)/den, bb=(sy-mm*sx)/n;
        for(let gx=4;gx<GW-4;gx+=3){const gy=mm*gx+bb; if(gy>1&&gy<GH-1) i.paintAt(gx,gy,1.6,0,0.5);} } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"girl", grp:"Studies", title:"Girl with a Pearl Earring — drying passes",
  note:"A stylised homage (not a reproduction) built up as watercolor glazes: dark ground, skin, blue turban, gold drape, then shadows and the pearl highlight. dry() is called between every pass, so each layer sets before the next floats on top — the way real watercolor portraits are built.",
  build(host){ const {i,GW,GH}=newInst(host); const rng=mulberry32(21), cx=GW/2;
    const disc=(x,y,rad,pig,str,n)=>{for(let k=0;k<n;k++){const a=rng()*6.2832,rr=Math.sqrt(rng())*rad;i.paintAt(x+Math.cos(a)*rr,y+Math.sin(a)*rr,4,pig,str);}};
    const passes=[
      ()=>disc(cx,GH*0.5,GW*0.55,2,0.32,300),                          // dark ground (blue)
      ()=>{disc(cx,GH*0.46,GW*0.17,1,0.28,200);disc(cx,GH*0.46,GW*0.14,0,0.12,120);}, // skin
      ()=>disc(cx,GH*0.27,GW*0.2,2,0.5,220),                           // blue turban
      ()=>disc(cx+GW*0.06,GH*0.38,GW*0.13,1,0.5,140),                  // gold drape
      ()=>{disc(cx-GW*0.05,GH*0.52,GW*0.05,0,0.3,80);i.paintAt(cx-GW*0.03,GH*0.56,3.2,1,0.85);} // shadow + pearl
    ];
    let pi=0,last=-1e9,done=false;
    function frame(t){ if(done)return; if(t-last>1400){ if(pi>0) try{i.dry();}catch(e){} if(pi<passes.length){passes[pi++]();last=t;} else done=true; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"cmy", grp:"Studies", title:"CMY channel separation",
  note:"A procedural source image is split into subtractive channels and painted one at a time — Magenta (rose), then Yellow, then Cyan (blue) — drying between each channel so the layers register like a CMYK print rather than muddying. Channel intensity sets per-dab strength.",
  build(host){ const {i,GW,GH}=newInst(host);
    const W=120,H=120,c=document.createElement("canvas");c.width=W;c.height=H;const g=c.getContext("2d");
    const grd=g.createLinearGradient(0,0,W,H);grd.addColorStop(0,"#ff3b6b");grd.addColorStop(.5,"#ffd23f");grd.addColorStop(1,"#1fa2ff");
    g.fillStyle=grd;g.fillRect(0,0,W,H);
    g.fillStyle="#1f9d55";g.beginPath();g.arc(W*0.34,H*0.62,W*0.18,0,6.2832);g.fill();
    g.fillStyle="#7a3fb0";g.fillRect(W*0.55,H*0.18,W*0.3,H*0.3);
    let data;try{data=g.getImageData(0,0,W,H).data;}catch(e){data=null;}
    const px=(nx,ny)=>{if(!data)return[128,128,128];const x=Math.min(W-1,nx*W|0),y=Math.min(H-1,ny*H|0),o=(y*W+x)*4;return[data[o],data[o+1],data[o+2]];};
    const chans=[{pig:0,f:(r,gg,b)=>1-gg/255},{pig:1,f:(r,gg,b)=>1-b/255},{pig:2,f:(r,gg,b)=>1-r/255}];
    const STEP=4; let ci=0,last=-1e9,done=false;
    function frame(t){ if(done)return; if(t-last>2600){ if(ci>0) try{i.dry();}catch(e){}
      if(ci<chans.length){ const ch=chans[ci++];
        for(let gy=2;gy<GH-2;gy+=STEP)for(let gx=2;gx<GW-2;gx+=STEP){const c3=px(gx/GW,gy/GH),v=ch.f(c3[0],c3[1],c3[2]); if(v>0.08) i.paintAt(gx,gy,STEP*0.7,ch.pig,v*0.7);}
        last=t; } else done=true; } }
    return { frame, cleanup(){ bye(i); } };
  } },

// ===================== EXPERIMENTS (ten ideas) =====================
{ id:"flowfield", grp:"Experiments", title:"Flow-field garden",
  note:"Particles drift along a time-evolving noise field, each laying down pigment as it goes; spent particles respawn elsewhere. The fluid sim turns the trails into organic, vein-like growth.",
  build(host){ const {i,GW,GH}=newInst(host); const rng=mulberry32(3),P=90,ps=[];
    for(let k=0;k<P;k++)ps.push({x:rng()*GW,y:rng()*GH,pig:k%3,life:rng()*200|0});
    const n2=(x,y)=>{const s=Math.sin(x*12.9898+y*78.233)*43758.5453;return s-Math.floor(s);};
    function frame(t){ const tt=t*0.0003;
      for(const p of ps){ const a=n2(p.x*0.05+tt,p.y*0.05)*12.566; p.x+=Math.cos(a)*0.9;p.y+=Math.sin(a)*0.9;p.life--;
        if(p.x<1||p.x>GW-1||p.y<1||p.y>GH-1||p.life<0){p.x=rng()*GW;p.y=rng()*GH;p.life=120+(rng()*160|0);}
        i.paintAt(p.x,p.y,1.7,p.pig,0.22); } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"chroma", grp:"Experiments", title:"Pigment chromatography",
  note:"A blob mixing all three pigments is dropped on wet paper, then gravity pulls it downward. Because the pigments have different densities and granulation, they separate into bands as they run — paper chromatography, in paint.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i); const cx=GW/2,ty=GH*0.16; let started=false;
    function frame(t){ if(!started){ for(let k=0;k<70;k++){const a=Math.random()*6.2832,r=Math.sqrt(Math.random())*8;i.paintAt(cx+Math.cos(a)*r,ty+Math.sin(a)*r,4,k%3,0.7);} try{i.gravityDirection("down");i.gravityStrength(0.18);}catch(e){} started=true; } }
    return { frame, cleanup(){ try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"kaleido", grp:"Experiments", title:"Kaleidoscope (interactive)",
  note:"Drag on the canvas: every stroke is mirrored into six radial sectors around the center, so you paint a living mandala. The built-in brush handles sector one; the scene mirrors the rest.",
  build(host){ const {i,GW,GH}=newInst(host); const cx=GW/2,cy=GH/2,SECT=6;
    const canvas=host.querySelector("canvas");
    function stamp(gx,gy,pig){ const dx=gx-cx,dy=gy-cy,baseA=Math.atan2(dy,dx),rad=Math.hypot(dx,dy);
      for(let s=1;s<SECT;s++){const a=baseA+s*6.2832/SECT;i.paintAt(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad,Math.max(3,GW*0.018),(pig+s)%3,0.55);} }
    function onMove(e){ if(e.type==="pointermove"&&e.buttons!==1)return; const gg=i.toGrid(e.clientX,e.clientY); stamp(gg.x,gg.y,0); }
    if(canvas){canvas.addEventListener("pointerdown",onMove);canvas.addEventListener("pointermove",onMove);}
    stamp(cx+GW*0.22,cy-GH*0.05,1);    // seed so there's something on load
    function frame(t){}
    return { frame, cleanup(){ if(canvas){canvas.removeEventListener("pointerdown",onMove);canvas.removeEventListener("pointermove",onMove);} bye(i); } };
  } },

{ id:"rorschach", grp:"Experiments", title:"Rorschach blooms",
  note:"Random blots land on the left half of wet paper and are mirrored to the right, blooming symmetrically — an inkblot generator where the watercolor bleed does the suggestion.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i); const rng=mulberry32(11),cx=GW/2; let last=-1e9,n=0;
    function frame(t){ if(t-last>480&&n<46){const x=rng()*cx,y=rng()*GH,r=3+rng()*4,pig=n%3;i.paintAt(x,y,r,pig,0.6);i.paintAt(2*cx-x,y,r,pig,0.6);n++;last=t;} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"mixer", grp:"Experiments", title:"Subtractive color mixing",
  note:"Three primary puddles — rose, yellow, blue — are dropped so they overlap. Where they meet you get the secondaries the way real pigment mixes (subtractive): rose+yellow→orange, yellow+blue→green, all three→a dark neutral.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const spots=[{x:GW*0.41,y:GH*0.42,pig:0},{x:GW*0.59,y:GH*0.42,pig:1},{x:GW*0.5,y:GH*0.58,pig:2}];
    let k=0,last=-1e9,done=false;
    function frame(t){ if(done)return; if(t-last>900){ if(k<spots.length){const s=spots[k++];for(let q=0;q<80;q++){const a=Math.random()*6.2832,r=Math.sqrt(Math.random())*11;i.paintAt(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r,4,s.pig,0.5);}last=t;} else done=true; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"type", grp:"Experiments", title:"Bleeding typography",
  note:"A word is painted onto pre-wetted paper so the letters bloom and feather outward, then dry() crisps what remains — wet-into-wet lettering that sets into the page.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i); let phase=0,last=-1e9;
    function frame(t){ if(phase===0){ try{i.pigment(2);}catch(e){} try{i.paintText("wash",{});}catch(e){} phase=1;last=t; }
      else if(phase===1&&t-last>2600){ try{i.dry();}catch(e){} phase=2; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"life", grp:"Experiments", title:"Game of Life in washes",
  note:"Conway's Life on a coarse grid: each generation the live cells are dabbed (color cycling by generation) and dried, so the automaton paints its own history as overlapping translucent glazes.",
  build(host){ const {i,GW,GH}=newInst(host); const rng=mulberry32(5);
    const C=Math.min(38,Math.max(8,GW/4|0)),R=Math.min(38,Math.max(8,GH/4|0)); let g=new Uint8Array(C*R);
    for(let k=0;k<C*R;k++)g[k]=rng()<0.32?1:0; const cw=GW/C,ch=GH/R; let last=-1e9,gen=0;
    function step(){const n=new Uint8Array(C*R);for(let y=0;y<R;y++)for(let x=0;x<C;x++){let s=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){if(dx||dy){s+=g[((y+dy+R)%R)*C+((x+dx+C)%C)];}}const a=g[y*C+x];n[y*C+x]=((a&&(s===2||s===3))||(!a&&s===3))?1:0;}g=n;}
    function frame(t){ if(t-last>700){ for(let y=0;y<R;y++)for(let x=0;x<C;x++) if(g[y*C+x]) i.paintAt(x*cw+cw/2,y*ch+ch/2,cw*0.4,gen%3,0.45); try{i.dry();}catch(e){} step();gen++;last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"lissajous", grp:"Experiments", title:"Lissajous trace",
  note:"A pen rides a Lissajous curve whose phase slowly drifts; fadePainting() turns the path into ribboning, self-intersecting watercolor loops.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.fadePainting(true);}catch(e){}
    const cx=GW/2,cy=GH/2,A=GW*0.4,B=GH*0.4,a=3,b=2;
    function frame(t){ const d=t*0.0009; for(let k=0;k<6;k++){const tt=t*0.004+k*0.04,x=cx+A*Math.sin(a*tt+d),y=cy+B*Math.sin(b*tt);i.paintAt(x,y,2.3,(k+(t*0.001|0))%3,0.4);} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"audio", grp:"Experiments", title:"Audio-reactive bloom",
  note:"Microphone amplitude drives the size and strength of blooming splashes (allow mic access). With no mic it falls back to a synthetic pulse, so it always animates.",
  build(host){ const {i,GW,GH}=newInst(host); let actx,analyser,data,synth=false,phase=0;
    (async()=>{ try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)throw 0;
      actx=new AC(); const st=await navigator.mediaDevices.getUserMedia({audio:true}); const src=actx.createMediaStreamSource(st);
      analyser=actx.createAnalyser();analyser.fftSize=256;src.connect(analyser);data=new Uint8Array(analyser.frequencyBinCount);
    }catch(e){ synth=true; } })();
    function amp(){ if(synth||!analyser){ phase+=0.05; return 0.35+0.4*Math.abs(Math.sin(phase)); } analyser.getByteFrequencyData(data); let s=0;for(let k=0;k<data.length;k++)s+=data[k]; return Math.min(1,(s/data.length)/120); }
    let last=-1e9;
    function frame(t){ const a=amp(); if(t-last>120){ i.paintAt(GW*0.5+(Math.random()-0.5)*GW*0.4,GH*0.5+(Math.random()-0.5)*GH*0.4,2+a*GW*0.06,Math.random()*3|0,0.3+a*0.5); last=t; } }
    return { frame, cleanup(){ try{actx&&actx.close();}catch(e){} bye(i); } };
  } },

{ id:"weather", grp:"Experiments", title:"Watercolor weather diorama",
  note:"Cycles the library's built-in animation modes — partly cloudy, rain, thunderstorm, flooded, tornado — every few seconds, so the page paints an evolving weather scene by itself.",
  build(host){ const {i,GW,GH}=newInst(host); const modes=["partlyCloudy","rainy","thunderstorm","flooded","tornado"]; let mi=0,last=-1e9;
    function frame(t){ if(t-last>4200){ try{i.setAnimation(modes[mi%modes.length]);}catch(e){} mi++;last=t; } }
    return { frame, cleanup(){ try{i.setAnimation(null);}catch(e){} bye(i); } };
  } },

// ===================== INTERACTIVE (ten pieces, masking woven through) =====================
{ id:"resist", grp:"Interactive", title:"Resist painting (mask brush)",
  note:"Press M for the mask (resist) brush and C for color, then paint. Masked strokes freeze the paper, so when you sweep color across, the resist shows through clean — like wax resist or masking fluid. Single strokes build up multi-region masks.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.maskTint(true);}catch(e){}
    const cv=host.querySelector("canvas");
    function setMode(e){ if(e.key==="m"||e.key==="M"){try{i.pigment("mask");}catch(_){}} else if(e.key==="c"||e.key==="C"){try{i.pigment(0);}catch(_){}} }
    window.addEventListener("keydown",setMode);
    try{i.pigment("mask");}catch(e){}
    // seed: a resist stripe + a flood sweep so something shows on load
    const r=host.getBoundingClientRect(),DW=r.width||560,DH=r.height||560;
    try{i.maskRect(DW*0.3,DH*0.15,DW*0.12,DH*0.7,8);}catch(e){}
    let swept=false;
    function frame(t){ if(!swept&&t>400){ try{i.pigment(2);}catch(e){} for(let gy=4;gy<GH;gy+=3) i.paintAt(GW*0.5,gy,GW*0.5,2,0.32); try{i.pigment("mask");}catch(e){} swept=true; } }
    return { frame, cleanup(){ window.removeEventListener("keydown",setMode); bye(i); } };
  } },

{ id:"stencil", grp:"Interactive", title:"Stencil stamps (mask)",
  note:"Click to drop rounded stencil masks; washes flood around them while the stencils stay crisp. maskTint shows the cut-outs. Stack several to build a layered, hard-edged composition over soft color.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.maskTint(true);}catch(e){}
    const cv=host.querySelector("canvas"), r=host.getBoundingClientRect(),DW=r.width||560,DH=r.height||560;
    function stamp(dx,dy){ const w=DW*(0.1+Math.random()*0.12),h=DH*(0.1+Math.random()*0.12); try{i.maskRect(dx-w/2,dy-h/2,w,h,12);}catch(e){} }
    function onDown(e){ const b=cv.getBoundingClientRect(); stamp(e.clientX-b.left,e.clientY-b.top); }
    if(cv) cv.addEventListener("pointerdown",onDown);
    stamp(DW*0.35,DH*0.4); stamp(DW*0.6,DH*0.55);          // seed stencils
    let last=-1e9;
    function frame(t){ if(t-last>900){ const pig=(t*0.001|0)%3; for(let k=0;k<60;k++){const gx=Math.random()*GW,gy=Math.random()*GH;i.paintAt(gx,gy,5,pig,0.22);} last=t; } }
    return { frame, cleanup(){ if(cv) cv.removeEventListener("pointerdown",onDown); bye(i); } };
  } },

{ id:"scratch", grp:"Interactive", title:"Scratch-off reveal (unmask)",
  note:"A hidden rainbow wash is laid down, then the whole sheet is masked and tinted to cover it. Drag to unmask under the cursor and 'scratch off' the cover, revealing the color beneath. The brush is set to water so dragging doesn't add pigment.",
  build(host){ const {i,GW,GH}=newInst(host);
    for(let k=0;k<400;k++){const gx=Math.random()*GW,gy=Math.random()*GH;i.paintAt(gx,gy,6,Math.random()*3|0,0.4);} // hidden wash
    try{i.dry();}catch(e){}
    const r=host.getBoundingClientRect(),DW=r.width||560,DH=r.height||560;
    try{i.maskRect(0,0,DW,DH,0); i.maskTint(true); i.pigment("water");}catch(e){}
    const cv=host.querySelector("canvas");
    function scratch(e){ if(e.type==="pointermove"&&e.buttons!==1)return; const b=cv.getBoundingClientRect(),x=e.clientX-b.left,y=e.clientY-b.top,s=DW*0.08; try{i.unmaskRect(x-s/2,y-s/2,s,s,s/2);}catch(_){}}
    if(cv){cv.addEventListener("pointerdown",scratch);cv.addEventListener("pointermove",scratch);}
    try{i.unmaskRect(DW*0.4,DH*0.4,DW*0.18,DH*0.18,20);}catch(e){} // seed a scratch
    function frame(t){}
    return { frame, cleanup(){ if(cv){cv.removeEventListener("pointerdown",scratch);cv.removeEventListener("pointermove",scratch);} bye(i); } };
  } },

{ id:"stencilprint", grp:"Interactive", title:"Layered stencil print (1 → many)",
  note:"A registered multi-color print built purely from masks on ONE sheet: each click runs a layer — mask everything except this layer's window, flood that pigment, then clear the mask for the next. One masked layer becomes a multi-layer composite, like screen-printing CMY in sequence.",
  build(host){ const {i,GW,GH}=newInst(host); try{i.maskTint(false);}catch(e){}
    const r=host.getBoundingClientRect(),DW=r.width||560,DH=r.height||560;
    const layers=[ {x:0.12,y:0.15,w:0.5,h:0.5,pig:0}, {x:0.42,y:0.32,w:0.46,h:0.5,pig:1}, {x:0.25,y:0.45,w:0.5,h:0.42,pig:2} ];
    let li=0;
    function doLayer(){ if(li>=layers.length)return; const L=layers[li++];
      try{ i.removeMask(); i.maskRect(0,0,DW,DH,0); i.unmaskRect(DW*L.x,DH*L.y,DW*L.w,DH*L.h,16); }catch(e){}
      for(let k=0;k<240;k++){const gx=Math.random()*GW,gy=Math.random()*GH;i.paintAt(gx,gy,5,L.pig,0.3);}
      try{ i.removeMask(); }catch(e){}
    }
    const cv=host.querySelector("canvas"); function onDown(){ doLayer(); }
    if(cv) cv.addEventListener("pointerdown",onDown);
    doLayer();                       // run first layer on load
    let last=-1e9;
    function frame(t){ if(t-last>1600 && li<layers.length){ doLayer(); last=t; } } // also auto-advance
    return { frame, cleanup(){ if(cv) cv.removeEventListener("pointerdown",onDown); try{i.removeMask();}catch(e){} bye(i); } };
  } },

{ id:"loom", grp:"Interactive", title:"Mirror loom (radial symmetry)",
  note:"Drag to weave a mandala — strokes are mirrored into N radial sectors. Press number keys 2–9 to change the fold count on the fly.",
  build(host){ const {i,GW,GH}=newInst(host); const cx=GW/2,cy=GH/2; let SECT=6;
    const cv=host.querySelector("canvas");
    function setFold(e){ const n=parseInt(e.key,10); if(n>=2&&n<=9) SECT=n; }
    window.addEventListener("keydown",setFold);
    function stamp(gx,gy){ const dx=gx-cx,dy=gy-cy,a0=Math.atan2(dy,dx),rad=Math.hypot(dx,dy); for(let s=1;s<SECT;s++){const a=a0+s*6.2832/SECT;i.paintAt(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad,Math.max(3,GW*0.016),(s)%3,0.5);} }
    function onMove(e){ if(e.type==="pointermove"&&e.buttons!==1)return; const g=i.toGrid(e.clientX,e.clientY); stamp(g.x,g.y); }
    if(cv){cv.addEventListener("pointerdown",onMove);cv.addEventListener("pointermove",onMove);}
    stamp(cx+GW*0.2,cy-GH*0.08);     // seed
    function frame(t){}
    return { frame, cleanup(){ window.removeEventListener("keydown",setFold); if(cv){cv.removeEventListener("pointerdown",onMove);cv.removeEventListener("pointermove",onMove);} bye(i); } };
  } },

{ id:"pour", grp:"Interactive", title:"Tilt to pour (gravity steering)",
  note:"Drag in a direction to 'tilt the paper' — the drag vector sets gravity, and wet pigment runs that way. Paint a puddle, then steer it around the page.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const cv=host.querySelector("canvas"); let px=null,py=null;
    function dir(e){ const b=cv.getBoundingClientRect(),x=e.clientX-b.left,y=e.clientY-b.top; if(px!=null){const dx=x-px,dy=y-py; if(Math.abs(dx)+Math.abs(dy)>2){ const d=Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up"); try{i.gravityDirection(d);i.gravityStrength(0.2);}catch(_){}}} px=x;py=y; }
    if(cv) cv.addEventListener("pointermove",dir);
    for(let k=0;k<80;k++){const a=Math.random()*6.2832,rr=Math.sqrt(Math.random())*9;i.paintAt(GW*0.5+Math.cos(a)*rr,GH*0.35+Math.sin(a)*rr,4,k%3,0.6);}
    try{i.gravityDirection("down");i.gravityStrength(0.16);}catch(e){}   // seed a pour
    function frame(t){}
    return { frame, cleanup(){ if(cv) cv.removeEventListener("pointermove",dir); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"interfere", grp:"Interactive", title:"Bloom interference",
  note:"Click to drop blooming wet splashes. Where two blooms meet, their pressure fronts push pigment into ridges and tidelines — overlapping clicks make interference patterns.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    const cv=host.querySelector("canvas");
    function bloom(gx,gy,pig){ for(let k=0;k<50;k++){const a=Math.random()*6.2832,rr=Math.sqrt(Math.random())*7;i.paintAt(gx+Math.cos(a)*rr,gy+Math.sin(a)*rr,4,pig,0.7);} }
    function onDown(e){ const g=i.toGrid(e.clientX,e.clientY); bloom(g.x,g.y,(Math.random()*3|0)); }
    if(cv) cv.addEventListener("pointerdown",onDown);
    bloom(GW*0.4,GH*0.45,0); bloom(GW*0.6,GH*0.5,2);    // seed two
    function frame(t){}
    return { frame, cleanup(){ if(cv) cv.removeEventListener("pointerdown",onDown); bye(i); } };
  } },

{ id:"smudge", grp:"Interactive", title:"Water smudge",
  note:"The brush is pure water — drag through the pre-painted color to push, dilute and bleed it, smearing wet pigment the way a clean wet brush does on a loaded wash.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i);
    for(let k=0;k<260;k++){const gx=Math.random()*GW,gy=Math.random()*GH;i.paintAt(gx,gy,6,Math.random()*3|0,0.45);} // wash to smudge
    try{i.pigment("water");}catch(e){}
    function frame(t){}
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"drips", grp:"Interactive", title:"Drip orchestra",
  note:"Click near the top to release a wet colored drop; gravity pulls it down in a runny streak. The cursor's horizontal position chooses the pigment, so you can conduct columns of colored drips.",
  build(host){ const {i,GW,GH}=newInst(host); wetPaper(i); try{i.gravityDirection("down");i.gravityStrength(0.22);}catch(e){}
    const cv=host.querySelector("canvas");
    function drop(gx,pig){ for(let k=0;k<40;k++){const a=Math.random()*6.2832,rr=Math.sqrt(Math.random())*6;i.paintAt(gx+Math.cos(a)*rr,GH*0.12+Math.sin(a)*rr,4,pig,0.75);} }
    function onDown(e){ const g=i.toGrid(e.clientX,e.clientY); drop(g.x, Math.min(2, (g.x/GW*3)|0)); }
    if(cv) cv.addEventListener("pointerdown",onDown);
    drop(GW*0.3,0); drop(GW*0.5,1); drop(GW*0.7,2);   // seed
    function frame(t){}
    return { frame, cleanup(){ if(cv) cv.removeEventListener("pointerdown",onDown); try{i.gravityStrength(0);}catch(e){} bye(i); } };
  } },

{ id:"ribbons", grp:"Interactive", title:"Velocity ribbons",
  note:"Move the cursor: fast motion paints thin, urgent lines and slow motion paints fat, soft ribbons — brush width tracks pointer speed, so the gesture's tempo is recorded in the stroke.",
  build(host){ const {i,GW,GH}=newInst(host); const cv=host.querySelector("canvas"); let lx=null,ly=null;
    function onMove(e){ if(e.type==="pointermove"&&e.buttons!==1)return; const g=i.toGrid(e.clientX,e.clientY); let r=GW*0.04; if(lx!=null){const sp=Math.hypot(g.x-lx,g.y-ly); r=Math.max(1.5, GW*0.05 - sp*0.4);} i.paintAt(g.x,g.y,r,0,0.5); lx=g.x;ly=g.y; }
    if(cv){cv.addEventListener("pointerdown",onMove);cv.addEventListener("pointermove",onMove);}
    i.paintAt(GW*0.4,GH*0.4,GW*0.05,0,0.5);  // seed
    function frame(t){}
    return { frame, cleanup(){ if(cv){cv.removeEventListener("pointerdown",onMove);cv.removeEventListener("pointermove",onMove);} bye(i); } };
  } },

// ===================== DAYTIME WEATHER (ten pastel presets, sinusoidal) =====================
// Pastel = low pigment strength; sinusoids drive drift, sway, and intensity.
{ id:"morninghaze", grp:"Daytime weather", title:"Morning haze",
  note:"Pale horizontal bands of mist drift sideways on a slow sine, fading in and out — a soft, low-contrast dawn wash.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fdf3ee");pastel(i);
    let last=-1e9;
    function frame(t){ if(t-last>140){ const yb=GH*(0.3+0.4*(0.5+0.5*Math.sin(t*0.0004))); const x=GW*(0.5+0.45*Math.sin(t*0.0006)); i.paintAt(x,yb,GW*0.16,2,0.12); i.paintAt(GW-x,yb*0.8,GW*0.13,0,0.08); last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"cottoncandy", grp:"Daytime weather", title:"Cotton-candy clouds",
  note:"Pink and sky-blue puffs bob on a vertical sine while drifting across — sweet, buoyant daytime clouds.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fbf6ff");pastel(i);
    const puffs=[]; for(let k=0;k<7;k++)puffs.push({px:Math.random(),y:0.2+Math.random()*0.4,ph:Math.random()*6.28,pig:k%2?0:2,sp:0.02+Math.random()*0.03});
    let last=-1e9;
    function frame(t){ if(t-last>120){ for(const p of puffs){ p.px+=p.sp*0.02; if(p.px>1.1)p.px=-0.1; const x=p.px*GW, y=(p.y+0.04*Math.sin(t*0.0008+p.ph))*GH; for(let k=0;k<6;k++){const a=Math.random()*6.28,rr=Math.sqrt(Math.random())*GW*0.05;i.paintAt(x+Math.cos(a)*rr,y+Math.sin(a)*rr,5,p.pig,0.1);} } last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"sunshower", grp:"Daytime weather", title:"Sun shower",
  note:"Light pastel rain that comes in gentle waves — the drop rate follows a slow sine, so it drizzles, eases, and returns.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#f3faff");pastel(i);
    function frame(t){ const rate=(0.5+0.5*Math.sin(t*0.0009)); const n=Math.round(rate*4); for(let k=0;k<n;k++){const x=Math.random()*GW,y=Math.random()*GH*0.9;i.paintAt(x,y,2.2,2,0.18+rate*0.12);} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"pollen", grp:"Daytime weather", title:"Pollen drift",
  note:"Tiny golden motes sway across the air on individual sine paths — a warm, dreamy spring afternoon.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fcfbf0");pastel(i);
    const m=[]; for(let k=0;k<40;k++)m.push({x:Math.random(),y:Math.random(),ph:Math.random()*6.28,sp:0.001+Math.random()*0.002});
    function frame(t){ for(const d of m){ d.x+=d.sp; if(d.x>1)d.x-=1; const x=d.x*GW, y=(d.y+0.05*Math.sin(t*0.001+d.ph))*GH; i.paintAt(x,y,1.6,1,0.16); } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"rainbowarc", grp:"Daytime weather", title:"Pastel rainbow arc",
  note:"A soft rainbow arc whose brightness breathes in and out on a sine — its rose/gold/blue bands brightening together.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#f7fbff");pastel(i);
    const cx=GW/2,cy=GH*0.95,R=GW*0.42;
    function frame(t){ const amp=0.06+0.12*(0.5+0.5*Math.sin(t*0.0011)); for(let a=Math.PI*0.05;a<Math.PI*0.95;a+=0.04){const x=cx+Math.cos(a+Math.PI)*R, y=cy+Math.sin(a+Math.PI)*R; const pig=a<Math.PI*0.37?0:a<Math.PI*0.63?1:2; if(y>0&&y<GH) i.paintAt(x,y,3,pig,amp);} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"dapple", grp:"Daytime weather", title:"Dappled light",
  note:"Soft green-gold dapples of sun-through-leaves flicker on offset sine phases, like light moving over a meadow.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#f6faf0");pastel(i);
    const spots=[]; for(let k=0;k<22;k++)spots.push({x:Math.random(),y:Math.random(),ph:Math.random()*6.28});
    let last=-1e9;
    function frame(t){ if(t-last>110){ for(const s of spots){ const v=0.5+0.5*Math.sin(t*0.0016+s.ph); if(v>0.7) i.paintAt(s.x*GW,s.y*GH,GW*0.03,1,(v-0.7)*0.5); } last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"drizzlemist", grp:"Daytime weather", title:"Spring drizzle mist",
  note:"A fine cool mist whose density pulses on a long sine — barely-there pastel grey-blue that thickens and thins.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#f4f7f8");pastel(i);
    function frame(t){ const dens=0.4+0.6*(0.5+0.5*Math.sin(t*0.0007)); const n=Math.round(dens*3); for(let k=0;k<n;k++){i.paintAt(Math.random()*GW,Math.random()*GH,1.6,2,0.09*dens);} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"petals", grp:"Daytime weather", title:"Floating petals",
  note:"Pink blossom petals sway and fall on sine paths, settling softly — a gentle cherry-blossom breeze.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fff7fb");pastel(i);
    const p=[]; for(let k=0;k<26;k++)p.push({x:Math.random(),y:Math.random(),ph:Math.random()*6.28,vy:0.0008+Math.random()*0.0014});
    function frame(t){ for(const d of p){ d.y+=d.vy; if(d.y>1){d.y=0;d.x=Math.random();} const x=(d.x+0.06*Math.sin(t*0.0012+d.ph))*GW, y=d.y*GH; i.paintAt(x,y,2.2,0,0.14); } }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"shimmer", grp:"Daytime weather", title:"Heat shimmer",
  note:"A warm pale wash near the horizon wobbles with a low-amplitude horizontal sine — the quiver of hot air on a calm bright day.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fffaf2");pastel(i);
    function frame(t){ const yb=GH*0.6; for(let gx=4;gx<GW-4;gx+=5){ const off=GW*0.02*Math.sin(gx*0.15 + t*0.004); i.paintAt(gx+off,yb,3,1,0.07); i.paintAt(gx-off,yb+GH*0.05,3,0,0.05);} }
    return { frame, cleanup(){ bye(i); } };
  } },

{ id:"daydream", grp:"Daytime weather", title:"Daydream sky",
  note:"The whole sky slowly breathes between pastel hues — pigment weight crossfades on staggered sines, so rose, gold and blue rise and fall through one another.",
  build(host){ const {i,GW,GH}=newInst(host); paper(i,"#fbfaf7");pastel(i);
    let last=-1e9;
    function frame(t){ if(t-last>120){ const w=[0.5+0.5*Math.sin(t*0.0005),0.5+0.5*Math.sin(t*0.0005+2.09),0.5+0.5*Math.sin(t*0.0005+4.19)];
      for(let k=0;k<10;k++){const x=Math.random()*GW,y=Math.random()*GH; let pig=0,best=-1; for(let q=0;q<3;q++) if(w[q]>best){best=w[q];pig=q;} i.paintAt(x,y,GW*0.05,pig,0.05+best*0.08);} last=t; } }
    return { frame, cleanup(){ bye(i); } };
  } },
];

// ---- shell ---------------------------------------------------------------
const stage=document.getElementById("stage"), hud=document.getElementById("hud");
const sTitle=document.getElementById("sTitle"), sNote=document.getElementById("sNote"), menu=document.getElementById("menu");
let cur=null, start=0, raf=0;

function run(scene, btn){
  if(cur){ try{cur.cleanup();}catch(e){} cur=null; }
  cancelAnimationFrame(raf);
  stage.innerHTML=""; hud.textContent="";
  sTitle.textContent=scene.title; sNote.textContent=scene.note;
  [...menu.querySelectorAll("button")].forEach(b=>b.setAttribute("aria-current", b===btn?"true":"false"));
  let built;
  try{ built=scene.build(stage); }catch(e){ hud.textContent="build error: "+e.message; return; }
  cur=built; start=performance.now();
  const loop=()=>{ if(!cur)return; try{ cur.frame(performance.now()-start); }catch(e){ hud.textContent="frame error: "+e.message; cur=null; return; } raf=requestAnimationFrame(loop); };
  raf=requestAnimationFrame(loop);
}

// build menu
let lastGrp=null;
for(const sc of SCENES){
  if(sc.grp!==lastGrp){ const h=document.createElement("div"); h.className="grp"; h.textContent=sc.grp; menu.appendChild(h); lastGrp=sc.grp; }
  const b=document.createElement("button"); b.textContent=sc.title; b.addEventListener("click",()=>run(sc,b)); menu.appendChild(b);
}
// start on the first scene
run(SCENES[0], menu.querySelector("button"));
</script>
</body>
