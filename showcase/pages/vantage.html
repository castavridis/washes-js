<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VANTAGE — chart of a quiet sector</title>
<style>
  :root{ color-scheme: dark; --line: rgba(28,52,74,0.5); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:#a6b2bd; }
  body{ font-family: ui-monospace,"SF Mono",Menlo,monospace; cursor:none; }
  #stage{ position:fixed; inset:0; }
  #stage canvas{ display:block; width:100% !important; height:100% !important; }
  .canopy{ position:fixed; inset:0; pointer-events:none; }
  .canopy svg{ width:100%; height:100%; }
  .canopy line,.canopy path,.canopy circle,.canopy rect{ stroke:var(--line); fill:none; stroke-width:1; vector-effect:non-scaling-stroke; }
  .glyph{ position:fixed; font-size:10.5px; letter-spacing:.28em; color:rgba(24,46,68,0.66); pointer-events:none; white-space:pre; }
  .tl{ top:18px; left:22px; } .tr{ top:18px; right:22px; text-align:right; }
  .bl{ bottom:18px; left:22px; } .br{ bottom:18px; right:22px; text-align:right; }
  .title{ letter-spacing:.62em; font-weight:600; }
  .dim{ color:rgba(24,46,68,0.4); }
  /* sensor cursor + ping ripple */
  .cursor{ position:fixed; width:26px; height:26px; margin:-13px 0 0 -13px; border:1px solid rgba(24,46,68,0.7); border-radius:50%; pointer-events:none; transition:width .12s,height .12s,margin .12s,border-color .2s; }
  .cursor::after{ content:''; position:absolute; inset:11px; border-radius:50%; background:rgba(24,46,68,0.7); }
  .cursor.warm{ border-color:rgba(150,50,70,0.9); width:34px; height:34px; margin:-17px 0 0 -17px; }
  .ripple{ position:fixed; border:1px solid rgba(150,50,70,0.6); border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); opacity:.8; }
  /* onboarding: a clear instruction that stays until you actually stir */
  .hint{ position:fixed; left:0; right:0; top:46%; text-align:center; transform:translateY(-50%); pointer-events:none; transition:opacity 1s ease; }
  .hint .big{ font-size:13px; letter-spacing:.46em; color:rgba(24,46,68,0.66); text-indent:.46em; }
  .hint .sub{ display:block; margin-top:14px; font-size:11px; letter-spacing:.3em; color:rgba(24,46,68,0.42); text-indent:.3em; }
  @media (max-width:640px){ .cursor{display:none;} body{cursor:auto;} .glyph{font-size:9px;letter-spacing:.2em;} }
</style>
</head>
<body>
  <div id="stage" aria-label="A star chart that reveals currents where you stir it. Tap to ping a sensor return."></div>
  <div class="canopy">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <rect x="14" y="14" width="972" height="972" rx="2"></rect>
      <path d="M14 64 L14 14 L64 14"></path><path d="M986 64 L986 14 L936 14"></path>
      <path d="M14 936 L14 986 L64 986"></path><path d="M986 936 L986 986 L936 986"></path>
      <circle cx="500" cy="500" r="3"></circle>
      <line x1="500" y1="470" x2="500" y2="486"></line><line x1="500" y1="514" x2="500" y2="530"></line>
      <line x1="470" y1="500" x2="486" y2="500"></line><line x1="514" y1="500" x2="530" y2="500"></line>
    </svg>
  </div>
  <div class="glyph tl"><span class="title">VANTAGE</span>
<span class="dim">sector 19·δ — drift survey</span></div>
  <div class="glyph tr" id="rdg">bearing ···
range ····</div>
  <div class="glyph bl" id="log"><span class="dim">sensors warm · field nominal</span></div>
  <div class="glyph br dim">move = read currents
tap  = ping a return</div>
  <div class="cursor" id="cur"></div>
  <div class="hint" id="hint"><span class="big">MOVE TO READ THE CURRENTS</span><span class="sub">tap anywhere to ping a return</span></div>
  <script src="../../engine/dist/washes.standalone.js"></script>
  <script type="module">
    const stage=document.getElementById('stage'), cur=document.getElementById('cur'),
          rdg=document.getElementById('rdg'), logEl=document.getElementById('log'), hint=document.getElementById('hint');
    const Washes = window.Washes || window.Watercolor;
    if (Washes && stage){
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      // paper pulled into the page's cool-grey hue family so the chart blends with the frame
      const wc = Washes.create(stage, { gpu:true, pointer:false, paperColor:{ r:0.70, g:0.75, b:0.80 } });
      let G=wc.state();
      const gx=nx=>nx*G.gridWidth, gy=ny=>ny*G.gridHeight, safe=fn=>{try{return fn();}catch(_){}};
      addEventListener('resize', ()=>safe(()=>{G=wc.state();}), {passive:true});

      safe(()=>wc.flow(0.16)); safe(()=>wc.evaporation(3.0)); safe(()=>wc.fadePainting(true)); safe(()=>wc.edgeMode('open'));
      // denser, slightly more visible nebular seed so stirring has obvious material to move
      for(let i=0;i<320;i++) wc.paintNorm(Math.random(),Math.random(),0.05+Math.random()*0.06,'blue',0.06+Math.random()*0.06);
      if(!reduce) safe(()=>wc.setAnimation('drift',{speed:0.25,amplitude:0.4}));

      const ang3=(nx,ny)=>{ const a=((Math.atan2(ny-0.5,nx-0.5)*180/Math.PI)+450)%360; return a.toFixed(0).padStart(3,'0')+'·'+(Math.hypot(nx-0.5,ny-0.5)*2).toFixed(2); };

      // ---- stir (drag/move only; no default paint) ----
      let px=null,py=null,pt=0,moved=0,interacted=false;
      function stir(cx,cy){
        const nx=cx/innerWidth, ny=cy/innerHeight;
        cur.style.left=cx+'px'; cur.style.top=cy+'px';
        const dx=nx-0.5,dy=ny-0.5,ang=((Math.atan2(dy,dx)*180/Math.PI)+450)%360,rng=Math.hypot(dx,dy)*2;
        rdg.textContent='bearing '+ang.toFixed(0).padStart(3,'0')+'°\nrange  '+rng.toFixed(2);
        const now=performance.now();
        if(px!==null){ const vx=nx-px, vy=ny-py;
          safe(()=>wc.addVelocity(gx(nx),gy(ny),vx*40,vy*40,G.gridWidth*0.055));
          if(Math.hypot(vx,vy)>0.003) safe(()=>wc.paintNorm(nx,ny,0.035,'blue',0.06));
          moved+=Math.hypot(vx,vy);
          if(moved>0.5 && !interacted){ interacted=true; hint.style.opacity='0'; }
        }
        px=nx; py=ny; pt=now;
      }
      stage.addEventListener('pointermove', e=>stir(e.clientX,e.clientY), {passive:true});

      // ---- ping ----
      let pings=0;
      function ping(cx,cy){
        const nx=cx/innerWidth, ny=cy/innerHeight;
        safe(()=>wc.rewet(gx(nx),gy(ny),G.gridWidth*0.13));
        for(let i=0;i<20;i++){ const a=2*Math.PI*i/20; safe(()=>wc.addVelocity(gx(nx),gy(ny),Math.cos(a)*0.85,Math.sin(a)*0.85,G.gridWidth*0.09)); }
        safe(()=>wc.paintNorm(nx,ny,0.055,'yellow',0.4)); safe(()=>wc.paintNorm(nx,ny,0.11,'blue',0.12));
        cur.classList.add('warm'); setTimeout(()=>cur.classList.remove('warm'),220);
        // visible expanding ring so the ping clearly does something
        const r=document.createElement('div'); r.className='ripple'; r.style.left=cx+'px'; r.style.top=cy+'px'; r.style.width=r.style.height='10px';
        document.body.appendChild(r); requestAnimationFrame(()=>{ r.style.transition='width .7s ease-out,height .7s ease-out,opacity .7s ease-out'; r.style.width=r.style.height='220px'; r.style.opacity='0'; });
        setTimeout(()=>r.remove(),760);
        logEl.innerHTML='<span class="dim">PING '+(++pings).toString().padStart(3,'0')+' · echo '+ang3(nx,ny)+'</span>';
        if(!interacted){ interacted=true; hint.style.opacity='0'; }
      }
      stage.addEventListener('pointerdown', e=>ping(e.clientX,e.clientY));

      // ---- onboarding auto-demo: trace a current so cause→effect is obvious ----
      if(!reduce){
        let t=0; cur.style.opacity='1';
        const demo=setInterval(()=>{
          if(interacted || t>Math.PI*1.05){ clearInterval(demo); return; }
          t+=0.05; const nx=0.22+0.56*(t/(Math.PI*1.05)), ny=0.5+Math.sin(t*2.2)*0.17;
          cur.style.left=(nx*innerWidth)+'px'; cur.style.top=(ny*innerHeight)+'px';
          safe(()=>wc.addVelocity(gx(nx),gy(ny),Math.cos(t*2.2)*0.7,Math.sin(t*2.2)*0.5,G.gridWidth*0.05));
          safe(()=>wc.paintNorm(nx,ny,0.04,'blue',0.12));
        },40);
        // rare warm contacts
        setTimeout(function spawn(){ contact(); setTimeout(spawn,12000+Math.random()*12000); },9000);
      }
      function contact(){
        const edge=Math.random()*4|0; let nx,ny,vx,vy;
        if(edge===0){nx=0.02;ny=Math.random();vx=0.4;vy=(Math.random()-0.5)*0.3;}
        else if(edge===1){nx=0.98;ny=Math.random();vx=-0.4;vy=(Math.random()-0.5)*0.3;}
        else if(edge===2){nx=Math.random();ny=0.02;vx=(Math.random()-0.5)*0.3;vy=0.4;}
        else {nx=Math.random();ny=0.98;vx=(Math.random()-0.5)*0.3;vy=-0.4;}
        let life=0; const id=setInterval(()=>{ if(life++>120){clearInterval(id);return;}
          nx=Math.max(0,Math.min(1,nx+vx*0.006)); ny=Math.max(0,Math.min(1,ny+vy*0.006));
          safe(()=>wc.paintNorm(nx,ny,0.04,'rose',0.24)); safe(()=>wc.addVelocity(gx(nx),gy(ny),vx*0.5,vy*0.5,G.gridWidth*0.04));
        },60);
        logEl.innerHTML='<span class="dim">contact — bearing '+(((Math.atan2(ny-0.5,nx-0.5)*180/Math.PI)+450)%360).toFixed(0)+'° · faint</span>';
      }
    }
  </script>
</body>
</html>
