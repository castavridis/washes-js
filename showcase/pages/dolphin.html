<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Surfacing — a breach, in three breaths</title>
<style>
  :root{ color-scheme: dark; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:#06151f; overflow:hidden; }
  body{ font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  #stage{ position:fixed; inset:0; cursor:none; }
  #stage canvas{ display:block; width:100% !important; height:100% !important; }
  .grade{ position:fixed; inset:0; pointer-events:none; mix-blend-mode:multiply;
    background: radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,0) 0%, rgba(4,18,28,0.0) 40%, rgba(3,12,20,0.55) 100%); }
  .shaft{ position:fixed; inset:0; pointer-events:none; mix-blend-mode:screen; opacity:0;
    background: conic-gradient(from 200deg at 50% -20%, transparent 0deg, rgba(190,225,240,0.10) 18deg, transparent 30deg, transparent 330deg, rgba(190,225,240,0.08) 345deg, transparent 360deg);
    transition: opacity 1.2s ease; }
  .breath{ position:fixed; left:0; right:0; bottom:7vh; text-align:center; pointer-events:none;
    font-size:11px; letter-spacing:0.42em; text-transform:uppercase; color:rgba(214,236,244,0.0);
    transition: color 1.6s ease, letter-spacing 3s ease; text-indent:0.42em; }
  .breath.on{ color:rgba(214,236,244,0.5); letter-spacing:0.62em; }
  /* a soft bubble-cursor that follows the pointer */
  .bub{ position:fixed; width:30px; height:30px; margin:-15px 0 0 -15px; border-radius:50%; pointer-events:none;
    border:1px solid rgba(220,240,248,0.55); box-shadow: inset 0 4px 8px rgba(255,255,255,0.18), 0 0 14px rgba(190,225,240,0.18); }
  .bub::after{ content:''; position:absolute; top:5px; left:7px; width:7px; height:5px; border-radius:50%; background:rgba(255,255,255,0.55); }
  .tip{ position:fixed; left:0; right:0; top:5.5vh; text-align:center; font-size:10.5px; letter-spacing:0.34em;
    text-transform:uppercase; color:rgba(214,236,244,0.0); transition:color 1.2s ease; pointer-events:none; text-indent:0.34em; }
  .tip.on{ color:rgba(214,236,244,0.42); }
  @media (prefers-reduced-motion: reduce){ .shaft{ display:none; } }
  @media (pointer:coarse){ .bub{ display:none; } #stage{ cursor:auto; } }
</style>
</head>
<body>
  <div id="stage" aria-label="An abstract watercolor passage from underwater to air and back. Drag to release bubbles."></div>
  <div class="grade"></div>
  <div class="shaft" id="shaft"></div>
  <div class="bub" id="bub"></div>
  <div class="tip" id="tip">drag to release bubbles</div>
  <div class="breath" id="breath">hold</div>
  <script src="../../engine/dist/washes.standalone.js"></script>
  <script type="module">
    const stage=document.getElementById('stage'), shaftEl=document.getElementById('shaft'),
          breathEl=document.getElementById('breath'), bub=document.getElementById('bub'), tip=document.getElementById('tip');
    const Washes = window.Washes || window.Watercolor;
    if (Washes && stage){
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      // pointer:false → the engine won't paint with its default brush; WE own the bubble brush.
      const wc = Washes.compat1(Washes.create(stage, { gpu:true, pointer:false, paperColor:{ r:0.05, g:0.18, b:0.27 } }));  // v1-surface pin
      let G = wc.state();
      const gx=nx=>nx*G.gridWidth, gy=ny=>ny*G.gridHeight, safe=fn=>{try{return fn();}catch(_){}};
      addEventListener('resize', ()=>safe(()=>{G=wc.state();}), {passive:true});

      const DEEP=[0.05,0.18,0.27], SURF=[0.16,0.42,0.50], SKY=[0.78,0.90,0.95];
      const lerp=(a,b,t)=>a+(b-a)*t, mix=(A,B,t)=>A.map((v,i)=>lerp(v,B[i],t));
      const paper=a=>a<0.5?mix(DEEP,SURF,a/0.5):mix(SURF,SKY,(a-0.5)/0.5);
      const ss=t=>t<=0?0:t>=1?1:t*t*(3-2*t);
      const B0=0.26,APEX=0.52,RE=0.78;
      function altitude(p){ if(p<B0)return 0; if(p<APEX)return ss((p-B0)/(APEX-B0)); if(p<RE)return ss(1-(p-APEX)/(RE-APEX)); return 0; }

      safe(()=>wc.evaporation(2.2)); safe(()=>wc.flow(0.18)); safe(()=>wc.edgeMode('gravity'));
      let curAlt = 0;   // shared so the bubble brush knows if we're under water

      function burst(nx,ny,vel){
        const X=gx(nx),Y=gy(ny);
        try{ if(typeof wc.splash==='function'){ wc.splash([-0.18,-0.06,0.06,0.18].map(d=>({x:gx(nx+d),y:Y,velocity:vel||38})),'spray'); return; } }catch(_){}
        for(let i=0;i<14;i++){ const a=Math.PI*(i/14)-Math.PI/2; wc.addVelocity(X,Y,Math.cos(a)*0.9,-Math.abs(Math.sin(a))*1.1,G.gridWidth*0.05); }
        wc.paintNorm(nx,ny,0.06,'blue',0.5);
      }

      // ---- the bubble brush: LIFT pigment off the murk so pale bubbles rise ----
      function bubbleAt(nx,ny){
        safe(()=>wc.brushMode('crayon'));                 // crayon lifts deposited pigment → lighter
        const n = 3 + (Math.random()*3|0);
        for(let i=0;i<n;i++){
          const jx=nx+(Math.random()-0.5)*0.045, jy=ny+(Math.random()-0.5)*0.045;
          const r=0.012+Math.random()*0.02;
          safe(()=>wc.paintNorm(jx,jy,r,0,0.55));          // lift (pigment arg ignored in crayon)
          safe(()=>wc.addVelocity(gx(jx),gy(jy),(Math.random()-0.5)*0.3,-0.7-Math.random()*0.7,G.gridWidth*0.03)); // rise
        }
        safe(()=>wc.brushMode('wet'));
      }
      let drawing=false, lastB=null;
      const rel=e=>({nx:e.clientX/innerWidth, ny:e.clientY/innerHeight});
      function moveCursor(cx,cy){ bub.style.left=cx+'px'; bub.style.top=cy+'px'; }
      function bubbleStroke(p){
        if(!lastB){ bubbleAt(p.nx,p.ny); lastB=p; return; }
        const dx=p.nx-lastB.nx, dy=p.ny-lastB.ny, dist=Math.hypot(dx,dy), n=Math.max(1,Math.ceil(dist/0.03));
        for(let i=1;i<=n;i++){ const t=i/n; bubbleAt(lastB.nx+dx*t, lastB.ny+dy*t); }
        lastB=p;
      }
      stage.addEventListener('pointerdown', e=>{ drawing=true; lastB=null; const p=rel(e); moveCursor(e.clientX,e.clientY); bubbleStroke(p); stage.setPointerCapture&&stage.setPointerCapture(e.pointerId); tip.classList.remove('on'); });
      stage.addEventListener('pointermove', e=>{ moveCursor(e.clientX,e.clientY); if(drawing) bubbleStroke(rel(e)); });
      const stopDraw=()=>{ drawing=false; lastB=null; };
      stage.addEventListener('pointerup', stopDraw); stage.addEventListener('pointercancel', stopDraw);

      // ---- ambient world ----
      let frame=0;
      function underwater(a){
        const top=a+0.015;
        if(frame%2===0){ const x=Math.random(), y=top+Math.random()*(1-top);
          wc.paintNorm(x,y,0.05+Math.random()*0.06,'blue',0.20+y*0.22);
          wc.addVelocity(gx(x),gy(y),(Math.random()-0.5)*0.18,-0.22-Math.random()*0.3,G.gridWidth*0.04); }
        if(frame%26===0){ const x=0.2+Math.random()*0.6;
          wc.paintNorm(x,top+0.04,0.03,'yellow',0.10); wc.paintNorm(x,top+0.14,0.05,'blue',0.08);
          wc.addVelocity(gx(x),gy(top+0.05),0,0.5,G.gridWidth*0.03); }
      }
      function airborne(a){
        if(frame%3===0){ const x=Math.random(), y=Math.random()*Math.max(0.05,a*0.7);
          safe(()=>wc.brushMode('splatter')); wc.paintNorm(x,y,0.02+Math.random()*0.03,'blue',0.18);
          wc.addVelocity(gx(x),gy(y),(Math.random()-0.5)*0.1,0.6+Math.random()*0.5,G.gridWidth*0.02); safe(()=>wc.brushMode('wet')); }
      }
      function step(a){
        curAlt=a;
        safe(()=>{ wc.removeMask(); if(a>0.004) wc.maskNorm(0,0,1,Math.min(0.999,a)); });
        const down=a*2-0.15;
        safe(()=>{ wc.gravityVector&&wc.gravityVector(0,down); wc.gravityStrength&&wc.gravityStrength(0.4+a*1.1); });
        const pc=paper(a); safe(()=>wc.paperColor(pc[0],pc[1],pc[2]));
        shaftEl.style.opacity=(a<0.45?(0.45-a)/0.45:0).toFixed(3);
        if(a<0.18) underwater(a); else if(a>0.82) airborne(a); else { underwater(a); if(a>0.4) airborne(a); }
        frame++;
      }

      if(reduce){ const a=0.5; for(let i=0;i<90;i++) step(a); breathEl.textContent='surface'; breathEl.classList.add('on'); tip.classList.add('on'); }
      else {
        const CYCLE=17000; let t0=performance.now(), lastAlt=0, shownBreath=false;
        setTimeout(()=>tip.classList.add('on'), 1200);
        (function loop(now){
          const p=((now-t0)%CYCLE)/CYCLE, a=altitude(p);
          if(lastAlt<=0.02 && a>0.02) burst(0.5,a+0.01,42);
          if(lastAlt>0.04 && a<=0.04) burst(0.5,0.02,50);
          lastAlt=a; step(a);
          if(!shownBreath && now-t0>APEX*CYCLE){ breathEl.textContent='breathe'; breathEl.classList.add('on'); shownBreath=true; setTimeout(()=>breathEl.classList.remove('on'),2600); }
          requestAnimationFrame(loop);
        })(t0);
      }
    }
  </script>
</body>
</html>
