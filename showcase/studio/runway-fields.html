<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIELDS — text to wash</title>
<style>
:root{ --bg:#101014; --panel:#17171d; --line:#2a2a33; --txt:#ececf1; --dim:#8a8a96; --hot:#ff5533; }
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:1180px;margin:0 auto;padding:0 26px;min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;font-size:13px;color:var(--dim)}
.logo{color:var(--txt);font-weight:800;letter-spacing:.22em;font-size:14px}
main{display:grid;grid-template-rows:auto 1fr auto;gap:16px;padding-bottom:10px}
h1{font-size:clamp(30px,4.4vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1.04;max-width:22ch}
h1 em{font-style:normal;color:var(--hot)}
/* the render viewport — a light sheet inside the dark editor */
.viewport{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#f2efe7;min-height:46vh}
.viewport .sim{position:absolute;inset:0}
.viewport canvas{display:block;width:100% !important;height:100% !important}
.vbadge{position:absolute;top:12px;right:12px;font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;color:#5a5346;background:rgba(242,239,231,.85);border:1px solid rgba(90,83,70,.25);border-radius:999px;padding:4px 10px;text-transform:uppercase}
/* the prompt bar */
.bar{display:grid;grid-template-columns:1fr auto;gap:10px}
.prompt{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 6px 6px 16px}
.prompt input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-family:inherit}
.prompt input::placeholder{color:#5b5b66}
.go{background:var(--hot);color:#180c08;font-weight:800;border:none;border-radius:9px;padding:10px 18px;font-size:14px;cursor:pointer;letter-spacing:.02em}
.chips{display:flex;gap:8px;align-items:center}
.chip{font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:7px 12px;cursor:pointer;background:var(--panel)}
.chip:hover{color:var(--txt)}
/* timeline */
.timeline{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;border-top:1px solid var(--line);padding:16px 0 26px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--dim)}
.timeline input[type=range]{width:100%;accent-color:var(--hot)}
footer{padding:0 0 26px;color:#56565f;font-size:12px;display:flex;justify-content:space-between}
@media (max-width:720px){ .chips{display:none} }
</style>
</head>
<body>
<div class="app">
<header><div class="logo">FIELDS</div><span>research preview 03</span></header>
<main>
  <h1>Type a word. We paint the <em>weather</em> of it.</h1>
  <div class="viewport"><div class="sim" id="sim"></div><div class="vbadge" id="vb">idle</div></div>
  <div class="bar">
    <div class="prompt"><span style="color:var(--hot)">✦</span>
      <input id="q" placeholder="storm, ember, reef, dusk…" maxlength="12" autocomplete="off">
      <button class="go" id="go">Render</button></div>
    <div class="chips"><span class="chip" data-w="STORM">storm</span><span class="chip" data-w="EMBER">ember</span><span class="chip" data-w="REEF">reef</span></div>
  </div>
  <div class="timeline"><span>frame 000</span><input type="range" id="scrub" min="0" max="100" value="35"><span id="fr">drift 35%</span></div>
</main>
<footer><span>FIELDS — a text-to-wash study</span><span>physics by Washes</span></footer>
</div>

<script src="../../engine/dist/washes.standalone.js"></script>
<script type="module">
const sim=document.getElementById('sim'), vb=document.getElementById('vb');
const Washes=window.Washes||window.Watercolor; const safe=f=>{try{return f();}catch(_){}};
if(Washes&&sim){
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let wc=null,G=null;
  function init(){
    wc=Washes.compat1(Washes.create(sim,{gpu:false,pointer:false,paperColor:{r:0.95,g:0.937,b:0.905}}));  // v1-surface pin
    G=wc.state(); const gx=n=>n*G.gridWidth, gy=n=>n*G.gridHeight;
    safe(()=>wc.flow(0.14)); safe(()=>wc.evaporation(0.9)); safe(()=>wc.quality('auto'));
    safe(()=>wc.on('perflevel',d=>{ vb.textContent='auto · '+d.level; }));
    const moods={ STORM:{pig:['blue','blue','rose'],g:[0,1.2],ev:0.6}, EMBER:{pig:['rose','yellow','yellow'],g:[0,-0.9],ev:2.2}, REEF:{pig:['blue','yellow','blue'],g:[0.5,0.1],ev:0.7}, DEFAULT:{pig:['blue','rose','yellow'],g:[0,0.3],ev:0.9} };
    function render(word){
      word=(word||'').trim().toUpperCase().slice(0,12)||'FIELDS';
      const m=moods[word]||moods.DEFAULT;
      safe(()=>wc.clearPaint?wc.clearPaint():wc.reset());
      vb.textContent='rendering';
      // the word, painted wet — three offset passes for chromatic fringing.
      // paintText centers on x/y; fontSize is in grid cells (raster px map
      // 1:1 to cells), so size the type from the grid, not the viewport.
      const fs2=Math.max(28, Math.min(G.gridHeight*0.42, (G.gridWidth*0.86)/(word.length*0.62)));
      m.pig.forEach((pig,i)=>{ safe(()=>wc.paintText&&wc.paintText(word,{x:gx(0.5)+i*2,y:gy(0.52)+i*2,fontSize:fs2,sampleStep:3,pigment:pig,strength:0.5-i*0.08})); });
      // never-blank guarantee: if the text path failed for any reason,
      // lay the word's energy down as a pigment ribbon instead.
      safe(()=>{ if((wc.coverage()||0)<0.0015){ for(let i=0;i<=26;i++){ const t=i/26;
        wc.paintNorm(0.12+0.76*t, 0.5+Math.sin(t*6.3)*0.08, 0.05, m.pig[i%3], 0.45); } } });
      safe(()=>wc.rewet(gx(0.5),gy(0.5),G.gridWidth*0.32));
      safe(()=>wc.gravityVector(m.g[0],m.g[1])); safe(()=>wc.gravityStrength&&wc.gravityStrength(0.7));
      safe(()=>wc.evaporation(m.ev));
      if(!reduce){ let k=0; const id=setInterval(()=>{ if(k++>24){clearInterval(id);vb.textContent='drifting';return;}
        safe(()=>wc.addVelocity(gx(0.2+Math.random()*0.6),gy(0.3+Math.random()*0.45),(Math.random()-0.5)*0.8,(Math.random()-0.3)*0.6,G.gridWidth*0.05)); },70); }
    }
    document.getElementById('go').addEventListener('click',()=>render(document.getElementById('q').value));
    document.getElementById('q').addEventListener('keydown',e=>{ if(e.key==='Enter') render(e.target.value); });
    document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{ document.getElementById('q').value=c.dataset.w.toLowerCase(); render(c.dataset.w); }));
    // frames scrubber = drift intensity (gravity strength + evaporation, scrubbed like a timeline)
    const scrub=document.getElementById('scrub'), fr=document.getElementById('fr');
    scrub.addEventListener('input',()=>{ const t=+scrub.value/100;
      safe(()=>wc.gravityStrength&&wc.gravityStrength(t*1.8)); safe(()=>wc.evaporation(0.3+t*3.2));
      fr.textContent='drift '+scrub.value+'%'; });
    render('FIELDS');
  }
  (function wait(){ if(sim.clientWidth>4&&sim.clientHeight>4) init(); else requestAnimationFrame(wait); })();
}
</script>
</body></html>
