<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Serpentine — a watercolor snake</title>
<style>
  :root{
    --ink:#23201a; --paper:#f3eee1; --line:rgba(35,32,26,.16);
    --accent:#7c3a2d; --dim:#6b6457;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Iowan Old Style",Palatino,"Palatino Linotype",Georgia,serif;
    -webkit-font-smoothing:antialiased; display:flex; min-height:100%;
    align-items:center; justify-content:center; padding:24px;
  }
  .frame{ width:min(620px,100%); }
  header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  h1{ font-size:25px; font-weight:600; letter-spacing:-.01em; }
  h1 .sub{ font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--dim);
           font-family:ui-monospace,Menlo,monospace; margin-left:10px; }
  .scores{ font-family:ui-monospace,Menlo,monospace; font-size:13px; color:var(--dim);
           display:flex; gap:18px; }
  .scores b{ color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }

  /* the board: a sheet of paper with a hairline frame */
  .board{ position:relative; aspect-ratio:1/1; border:1px solid var(--line);
          border-radius:6px; overflow:hidden; background:#f6f1e6;
          box-shadow:0 22px 50px -34px rgba(35,32,26,.5), inset 0 0 0 1px rgba(255,255,255,.4); }
  .board .sim{ position:absolute; inset:0; }
  .board canvas{ display:block; width:100%!important; height:100%!important; }
  /* a faint grid drawn over the wash so the game reads as a grid */
  .grid-overlay{ position:absolute; inset:0; pointer-events:none; opacity:.5; }

  /* overlays: start + game over, set on the paper itself */
  .veil{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
         justify-content:center; gap:14px; text-align:center; padding:24px;
         background:rgba(243,238,225,.78); backdrop-filter:blur(2px);
         transition:opacity .25s ease; }
  .veil.hidden{ opacity:0; pointer-events:none; }
  .veil h2{ font-size:30px; font-weight:600; letter-spacing:-.015em; }
  .veil p{ font-size:14.5px; color:var(--dim); max-width:34ch; line-height:1.5; }
  .veil .keys{ font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--dim);
               letter-spacing:.04em; }
  .btn{ font:inherit; font-size:15px; border:1px solid var(--ink); background:var(--ink);
        color:var(--paper); padding:10px 22px; border-radius:999px; cursor:pointer;
        letter-spacing:.01em; transition:transform .12s ease; }
  .btn:hover{ transform:translateY(-1px); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }

  .footer{ display:flex; align-items:center; justify-content:space-between; margin-top:14px;
           font-size:12.5px; color:var(--dim); }
  .palette-pick{ display:flex; gap:6px; align-items:center; }
  .swatch{ width:22px; height:22px; border-radius:50%; border:1px solid var(--line); cursor:pointer;
           padding:0; transition:transform .12s ease; }
  .swatch:hover{ transform:scale(1.12); }
  .swatch[aria-pressed="true"]{ box-shadow:0 0 0 2px var(--paper),0 0 0 3px var(--ink); }
  .hintline{ font-family:ui-monospace,Menlo,monospace; letter-spacing:.04em; }
  .toggles{ display:flex; gap:8px; }
  .tog{ font:inherit; font-size:12px; font-family:ui-monospace,Menlo,monospace; letter-spacing:.02em;
        border:1px solid var(--line); background:transparent; color:var(--dim);
        padding:5px 11px; border-radius:999px; cursor:pointer; transition:all .12s ease; }
  .tog:hover{ border-color:var(--ink); color:var(--ink); }
  .tog[aria-pressed="true"]{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .tog:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  @media (prefers-reduced-motion: reduce){ .btn{transition:none} }
  @media (max-width:520px){ h1 .sub{display:none} .scores{gap:12px} }
</style>
</head>
<body>
<div class="frame">
  <header>
    <h1>Serpentine<span class="sub">washes · snake</span></h1>
    <div class="scores"><span>score <b id="score">0</b></span><span>best <b id="best">0</b></span></div>
  </header>

  <div class="board" id="board">
    <div class="sim" id="sim"></div>
    <svg class="grid-overlay" id="grid" preserveAspectRatio="none"></svg>
    <div class="veil" id="veil">
      <h2 id="veil-title">A snake made of water.</h2>
      <p id="veil-text">Steer a brushstroke around the paper. Each step leaves a wet trail that blooms and dries behind you; the fruit is a bloom of its own. Eat, grow, don't cross your own line.</p>
      <button class="btn" id="start-btn">Begin the stroke</button>
      <div class="keys">arrows or WASD &nbsp;·&nbsp; space to pause</div>
    </div>
  </div>

  <div class="footer">
    <div class="palette-pick" id="palette-pick" title="Pigment palette">
      <span class="hintline" style="margin-right:4px;">ink</span>
      <!-- swatches injected -->
    </div>
    <div class="toggles">
      <button class="tog" id="tog-stroke" type="button" aria-pressed="false">Continuous stroke</button>
      <button class="tog" id="tog-fade" type="button" aria-pressed="true">Fade trail</button>
    </div>
  </div>
</div>

<script src="../engine/dist/washes.standalone.js"></script>
<script type="module">
const sim = document.getElementById('sim');
const Washes = window.Washes || window.Watercolor;
const safe = (f, d) => { try { return f(); } catch(_) { return d; } };

// ── palettes (each: [body ink, fruit ink, accent/“dry” ink]) ──
const PALETTES = {
  ink:    { label:'Indigo', swatch:'#3b4a7a', set:[{color:'#3b4a7a',granulation:0.35},{color:'#b0353b'},{color:'#1c2030',density:0.05}] },
  forest: { label:'Forest', swatch:'#2f6b43', set:[{color:'#2f6b43',granulation:0.3},{color:'#d68a2e'},{color:'#173a26'}] },
  plum:   { label:'Plum',   swatch:'#6d3470', set:[{color:'#6d3470',granulation:0.3},{color:'#c8a43a'},{color:'#2c1733'}] },
  rust:   { label:'Rust',   swatch:'#a8472a', set:[{color:'#a8472a',granulation:0.4},{color:'#3f7d86'},{color:'#3a1c12'}] },
};
let activePalette = 'ink';

// ── grid + game state ──
const COLS = 22, ROWS = 22;
let wc = null, G = null;
let game = null, running = false, paused = false, timer = null, stepMs = 150;
let best = 0;
// v2 — feature flags + state
let continuousMode = false;     // smooth ribbon vs discrete stamps
let fadeTail = true;            // dissolve the vacated trail behind the body
const fadeQ = [];               // recently-vacated cells, lifted a few frames to fade

function newGame(){
  return { snake:[{x:6,y:11},{x:5,y:11},{x:4,y:11}], dir:{x:1,y:0}, nextDir:{x:1,y:0},
           food:null, score:0, over:false, grow:0 };
}
function placeFood(g){
  const occ = new Set(g.snake.map(s=>s.x+','+s.y));
  let c, tries=0;
  do { c = { x:(Math.random()*COLS)|0, y:(Math.random()*ROWS)|0 }; tries++; }
  while(occ.has(c.x+','+c.y) && tries<800);
  g.food = c;
}
function step(g){
  if(g.over) return {};
  if(!(g.nextDir.x===-g.dir.x && g.nextDir.y===-g.dir.y)) g.dir = g.nextDir;
  const head = g.snake[0];
  const nh = { x:head.x+g.dir.x, y:head.y+g.dir.y };
  if(nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS){ g.over=true; return {died:'wall'}; }
  const body = g.snake.slice(0, g.grow>0 ? g.snake.length : g.snake.length-1);
  if(body.some(s=>s.x===nh.x&&s.y===nh.y)){ g.over=true; return {died:'self'}; }
  g.snake.unshift(nh);
  let ate=false;
  if(g.food && nh.x===g.food.x && nh.y===g.food.y){ ate=true; g.score++; g.grow+=2; g.food=null; }
  if(g.grow>0) g.grow--; else g.snake.pop();
  return { ate, head:nh, tail:(g.grow>0?null:head) };
}

// ── rendering: snake + food are wet pigment on the paper ──
const cx = c => (c + 0.5) / COLS;          // grid → normalized centre
const cy = r => (r + 0.5) / ROWS;
const cellR = 0.5 / Math.max(COLS, ROWS) * 1.45;   // body dab radius (tightened so cells don't over-bleed)
const liftR = 0.5 / Math.max(COLS, ROWS) * 0.9;    // lift radius (stays within the vacated cell)

function paintHead(p, fresh){
  if(!wc) return;
  // a wet dab of the body ink at the head; slightly stronger when fresh
  safe(()=>wc.paintNorm(cx(p.x), cy(p.y), cellR, 0, fresh?0.85:0.6));
}
// v2 — lay a dab at an arbitrary normalized point (used by continuous mode to
// stamp along the sub-cell path between grid steps)
function paintAtNorm(nx, ny, strength){
  if(!wc) return;
  safe(()=>wc.paintNorm(nx, ny, cellR, 0, strength==null?0.7:strength));
}
// v2 — fade the vacated trail: queue the cell the tail just left, then lift it
// (and the last few vacated cells) a little each step so it dissolves while the
// live body keeps getting fresh deposits and stays vivid.
function fadeTailStep(vacated){
  if(!wc || !fadeTail) return;
  if(vacated) fadeQ.push({ x:vacated.x, y:vacated.y, life:3 });
  for(let k=fadeQ.length-1;k>=0;k--){
    const f = fadeQ[k];
    safe(()=>wc.paintNorm(cx(f.x), cy(f.y), liftR, 'lift', 0.8));
    if(--f.life <= 0) fadeQ.splice(k,1);
  }
}
function paintFood(g){
  if(!wc || !g.food) return;
  // fruit: a bloom of the second ink with a little outward velocity
  safe(()=>wc.paintNorm(cx(g.food.x), cy(g.food.y), cellR*1.25, 1, 0.8));
  safe(()=>wc.addVelocity(cx(g.food.x)*G.gridWidth, cy(g.food.y)*G.gridHeight, 0, 0, G.gridWidth*0.02));
}
function eatBurst(p){
  if(!wc) return;
  // eating: a splash + radial velocity so the wash reacts, plus accent ink
  const gx = cx(p.x)*G.gridWidth, gy = cy(p.y)*G.gridHeight;
  for(let a=0;a<8;a++){ const ang=a/8*Math.PI*2;
    safe(()=>wc.addVelocity(gx, gy, Math.cos(ang)*1.3, Math.sin(ang)*1.3, G.gridWidth*0.05)); }
  safe(()=>wc.paintNorm(cx(p.x), cy(p.y), cellR*1.4, 2, 0.5));
  safe(()=> (wc.splash ? wc.splash([{x:gx,y:gy,velocity:30}],'fineSpritz') : null));
}

function tick(){
  if(!running || paused || !game) return;
  const prevHead = game.snake[0];
  const r = step(game);
  if(game.over){ endGame(r.died); return; }
  if(continuousMode){
    // lay dabs along the sub-path from prev head to new head so the body reads
    // as one unbroken wet ribbon rather than discrete stamps
    const steps = 4;
    for(let s=1;s<=steps;s++){
      const t = s/steps;
      paintAtNorm(cx(prevHead.x) + (cx(r.head.x)-cx(prevHead.x))*t,
                  cy(prevHead.y) + (cy(r.head.y)-cy(prevHead.y))*t,
                  s===steps?0.85:0.6);
    }
  } else {
    paintHead(r.head, true);
  }
  // dissolve the vacated tail (no-op while growing, since r.tail is null then)
  fadeTailStep(r.tail);
  if(r.ate){
    eatBurst(r.head);
    placeFood(game);
    paintFood(game);
    document.getElementById('score').textContent = game.score;
    // speed up a touch every few fruit, to a floor
    stepMs = Math.max(80, 150 - game.score*3);
    restartTimer();
  }
}
function restartTimer(){ if(timer) clearInterval(timer); timer = setInterval(tick, stepMs); }

// re-stamp food periodically so its bloom stays visible as it dries
let foodPulse = 0;

function startGame(){
  game = newGame();
  paused = false; running = true; stepMs = 150;
  fadeQ.length = 0;
  document.getElementById('score').textContent = '0';
  if(wc){ safe(()=> wc.clearPaint ? wc.clearPaint() : wc.reset()); }
  // lay the initial body as wet dabs
  game.snake.forEach((s,i)=> paintHead(s, i===0));
  placeFood(game); paintFood(game);
  hideVeil();
  restartTimer();
}
function endGame(cause){
  running = false; if(timer) clearInterval(timer);
  best = Math.max(best, game.score);
  document.getElementById('best').textContent = best;
  // a final bloom where it died
  const h = game.snake[0]; if(h) eatBurst(h);
  showVeil(
    cause==='wall' ? 'Off the edge of the page.' : 'Crossed your own line.',
    'Score ' + game.score + (game.score===best && best>0 ? ' — a new best.' : '. Best ' + best + '.'),
    'Paint again'
  );
}
function togglePause(){
  if(!running) return;
  paused = !paused;
  if(paused) showVeil('Paused.', 'The wash keeps drying. Space to resume.', 'Resume', true);
  else hideVeil();
}

// ── veil ──
const veil = document.getElementById('veil');
function showVeil(title, text, btn, isPause){
  document.getElementById('veil-title').textContent = title;
  document.getElementById('veil-text').textContent = text;
  const b = document.getElementById('start-btn'); b.textContent = btn;
  veil.classList.remove('hidden');
  veil.dataset.mode = isPause ? 'pause' : 'over';
}
function hideVeil(){ veil.classList.add('hidden'); }

// ── input ──
const DIRS = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
};
addEventListener('keydown', e=>{
  if(e.key === ' '){ e.preventDefault();
    if(veil.classList.contains('hidden')) togglePause();
    else if(veil.dataset.mode==='pause') togglePause();
    return; }
  const d = DIRS[e.key];
  if(d && game && running && !paused){ e.preventDefault(); game.nextDir = d; }
});
document.getElementById('start-btn').addEventListener('click', ()=>{
  if(veil.dataset.mode==='pause') togglePause(); else startGame();
});

// ── grid overlay ──
function drawGrid(){
  const svg = document.getElementById('grid');
  const ns='http://www.w3.org/2000/svg'; svg.setAttribute('viewBox',`0 0 ${COLS} ${ROWS}`);
  let html='';
  for(let i=1;i<COLS;i++) html+=`<line x1="${i}" y1="0" x2="${i}" y2="${ROWS}" stroke="rgba(35,32,26,.10)" stroke-width="0.02"/>`;
  for(let j=1;j<ROWS;j++) html+=`<line x1="0" y1="${j}" x2="${COLS}" y2="${j}" stroke="rgba(35,32,26,.10)" stroke-width="0.02"/>`;
  svg.innerHTML = html;
}

// ── palette picker ──
function buildPalettePicker(){
  const root = document.getElementById('palette-pick');
  Object.keys(PALETTES).forEach(key=>{
    const b = document.createElement('button');
    b.className='swatch'; b.style.background = PALETTES[key].swatch;
    b.title = PALETTES[key].label; b.setAttribute('aria-pressed', key===activePalette?'true':'false');
    b.addEventListener('click', ()=>{
      activePalette = key;
      [...root.querySelectorAll('.swatch')].forEach((el,i)=> el.setAttribute('aria-pressed', Object.keys(PALETTES)[i]===key?'true':'false'));
      if(wc && wc.palette) safe(()=> wc.palette(PALETTES[key].set));
    });
    root.appendChild(b);
  });
}

// ── init ──
function init(){
  wc = Washes.compat1(Washes.create(sim, { gpu:false, pointer:false, paperColor:{r:0.965,g:0.945,b:0.902} }));  // v1-surface pin
  G = wc.state();
  safe(()=> wc.palette && wc.palette(PALETTES[activePalette].set));
  safe(()=> wc.flow(0.12));
  safe(()=> wc.evaporation(0.9));           // trails dry at a painterly pace
  safe(()=> wc.quality('auto'));
  // keep food bloom alive + a gentle life to the wash
  safe(()=> wc.onFrame(()=>{
    if(!running || paused || !game || !game.food) return;
    if((foodPulse++ % 30)===0) paintFood(game);   // re-wet the fruit ~twice/sec
  }));
  addEventListener('resize', ()=> safe(()=>{ G = wc.state(); }), {passive:true});
  drawGrid();
  buildPalettePicker();
  // v2 — feature toggles
  const tStroke = document.getElementById('tog-stroke');
  if(tStroke) tStroke.addEventListener('click', ()=>{
    continuousMode = !continuousMode;
    tStroke.setAttribute('aria-pressed', continuousMode?'true':'false');
  });
  const tFade = document.getElementById('tog-fade');
  if(tFade) tFade.addEventListener('click', ()=>{
    fadeTail = !fadeTail;
    tFade.setAttribute('aria-pressed', fadeTail?'true':'false');
    if(!fadeTail) fadeQ.length = 0;     // stop lifting; leave existing trail to dry
  });
}
(function wait(){ if(sim.clientWidth>4 && sim.clientHeight>4) init(); else requestAnimationFrame(wait); })();
</script>
</body></html>
