<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Develop — paint to reveal</title>
<style>
  :root{ --ink:#1c1a16; --paper:#0d0c0b; --dim:#8a8174; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--paper); color:#e9e3d6;
    font-family:"Iowan Old Style",Palatino,Georgia,serif; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100%; align-items:center; justify-content:center;
    padding:24px; overflow:hidden;
  }
  .wrap{ width:min(680px,100%); }
  header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  h1{ font-size:23px; font-weight:600; letter-spacing:-.01em; color:#f1ebde; }
  h1 .sub{ font-size:11.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--dim);
           font-family:ui-monospace,Menlo,monospace; margin-left:10px; }
  .hint{ font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--dim); letter-spacing:.03em; }

  /* the stage: a black sheet you develop an image onto by painting */
  .stage{ position:relative; aspect-ratio:16/10; border-radius:8px; overflow:hidden;
          background:#0a0908; box-shadow:0 30px 80px -40px #000, inset 0 0 0 1px rgba(255,255,255,.05);
          cursor:crosshair; touch-action:none; }
  /* the visible output: content masked by the wash alpha */
  #out{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  /* the wash sim lives here but is hidden — we read its canvas as the mask source */
  #sim{ position:absolute; inset:0; opacity:0; pointer-events:none; }
  /* a faint instruction that fades once you start */
  .prompt{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
           text-align:center; pointer-events:none; transition:opacity .6s ease; }
  .prompt span{ font-size:15px; color:rgba(233,227,214,.55); letter-spacing:.02em;
                background:rgba(0,0,0,.25); padding:8px 16px; border-radius:999px; backdrop-filter:blur(3px); }
  .stage.touched .prompt{ opacity:0; }

  .toolbar{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .controls{ display:flex; gap:8px; }
  .btn{ font:inherit; font-size:12.5px; font-family:ui-monospace,Menlo,monospace; letter-spacing:.02em;
        border:1px solid rgba(233,227,214,.2); background:transparent; color:var(--dim);
        padding:6px 13px; border-radius:999px; cursor:pointer; transition:all .12s ease; }
  .btn:hover{ border-color:#e9e3d6; color:#e9e3d6; }
  .btn[aria-pressed="true"]{ background:#e9e3d6; color:#1c1a16; border-color:#e9e3d6; }
  .btn:focus-visible{ outline:2px solid #c98a5e; outline-offset:2px; }
</style>
</head>
<body>
<div class="wrap">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- turns RGB luminance into alpha; used to build a luminance mask -->
      <filter id="lumToAlpha" color-interpolation-filters="sRGB">
        <feColorMatrix type="luminanceToAlpha"/>
      </filter>
    </defs>
  </svg>
  <header>
    <h1>Develop<span class="sub">wash · as · mask</span></h1>
    <span class="hint" id="status">move to paint</span>
  </header>

  <div class="stage" id="stage">
    <canvas id="out"></canvas>
    <div id="sim"></div>
    <div class="prompt"><span id="prompt-text">Paint with your cursor to develop the image &nbsp;·&nbsp; or watch it paint itself</span></div>
  </div>

  <div class="toolbar">
    <div class="controls">
      <button class="btn" id="auto" type="button" aria-pressed="true">Auto demo</button>
      <button class="btn" id="showwash" type="button" aria-pressed="false">Show wash</button>
      <button class="btn" id="maskmode" type="button" title="What the wash masks with">Mask: alpha</button>
      <button class="btn" id="content" type="button">Shift colors</button>
      <button class="btn" id="clear" type="button">Clear</button>
    </div>
    <span class="hint">the wash's alpha is the mask</span>
  </div>
</div>

<script src="../engine/dist/washes.standalone.js"></script>
<script type="module">
const stage = document.getElementById('stage');
const sim = document.getElementById('sim');
const out = document.getElementById('out');
const octx = out.getContext('2d');
const Washes = window.Washes || window.Watercolor;
const safe = (f, d) => { try { return f(); } catch(_) { return d; } };

let wc = null, G = null, washCanvas = null;
let DPR = Math.min(2, window.devicePixelRatio || 1);
let W = 0, H = 0;
let lastPaint = 0;           // ms of last user paint, for idle detection
let autoOn = true;
let hue = 0;                 // content palette rotation
let showWash = false;        // when true, reveal the raw wash instead of using it as a mask
let maskMode = 'alpha';      // 'alpha' | 'luminance' | 'luminance-invert'

// near-white palette = invisible pigment, but the alpha is a clean mask.
const MASK_PALETTE = [{color:'#ffffff'},{color:'#dddddd'},{color:'#bbbbbb'}];
// visible palette for inspecting the wash itself, as watercolor on paper.
const WASH_PALETTE = [{color:'#2f6fb0',granulation:0.3},{color:'#b0353b'},{color:'#d68a2e'}];
// dark, tonal palette for luminance masking — thickness → darkness → reveal.
const LUM_PALETTE  = [{color:'#14141c',granulation:0.25},{color:'#241f28'},{color:'#1a2230'}];

// intermediate canvas: we render the wash here, convert its luminance to alpha
// (via the SVG filter), and use THAT as the mask source for destination-in.
const maskCanvas = document.createElement('canvas');
const mctx = maskCanvas.getContext('2d');
// feature-detect ctx.filter support once
const FILTER_OK = (() => { try { mctx.filter = 'url(#lumToAlpha)'; const ok = mctx.filter !== 'none'; mctx.filter='none'; return ok; } catch(_) { return false; } })();

// ── the revealed content: an animated, drifting color field + grain ──
// drawn onto an offscreen canvas each frame, then masked by the wash alpha.
let contentCanvas = document.createElement('canvas');
let cctx = contentCanvas.getContext('2d');
let grainCanvas = document.createElement('canvas');
let gctx = grainCanvas.getContext('2d');

function buildGrain(){
  grainCanvas.width = 160; grainCanvas.height = 160;
  const img = gctx.createImageData(160,160);
  for(let i=0;i<img.data.length;i+=4){
    const v = 200 + (Math.random()*55|0);
    img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=10;
  }
  gctx.putImageData(img,0,0);
}

function sizeAll(){
  const r = stage.getBoundingClientRect();
  W = Math.max(2, r.width|0); H = Math.max(2, r.height|0);
  for(const c of [out, contentCanvas]){ c.width = W*DPR; c.height = H*DPR; }
  out.style.width = W+'px'; out.style.height = H+'px';
}

function drawContent(t){
  const w = contentCanvas.width, h = contentCanvas.height;
  // a few large radial color blooms drifting over time → rich, saturated field
  cctx.globalCompositeOperation = 'source-over';
  cctx.fillStyle = '#0a0908'; cctx.fillRect(0,0,w,h);
  const blobs = [
    { hue:(hue+  0)%360, x:0.30+0.10*Math.sin(t*0.00021),     y:0.35+0.10*Math.cos(t*0.00017) },
    { hue:(hue+120)%360, x:0.70+0.12*Math.sin(t*0.00019+2),   y:0.45+0.12*Math.cos(t*0.00023+1) },
    { hue:(hue+220)%360, x:0.50+0.14*Math.sin(t*0.00013+4),   y:0.70+0.10*Math.cos(t*0.00029+3) },
    { hue:(hue+300)%360, x:0.45+0.10*Math.cos(t*0.00025+1.5), y:0.25+0.12*Math.sin(t*0.00015+2) },
  ];
  cctx.globalCompositeOperation = 'lighter';
  for(const b of blobs){
    const cx=b.x*w, cy=b.y*h, rad=Math.max(w,h)*0.55;
    const g = cctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0, `hsla(${b.hue},85%,60%,0.95)`);
    g.addColorStop(0.5,`hsla(${b.hue},80%,50%,0.35)`);
    g.addColorStop(1, `hsla(${b.hue},80%,45%,0)`);
    cctx.fillStyle = g; cctx.beginPath(); cctx.arc(cx,cy,rad,0,Math.PI*2); cctx.fill();
  }
  // grain
  cctx.globalCompositeOperation = 'overlay';
  const gp = cctx.createPattern(grainCanvas,'repeat');
  if(gp){ cctx.fillStyle = gp; cctx.fillRect(0,0,w,h); }
  cctx.globalCompositeOperation = 'source-over';
}

// Build the canvas whose ALPHA is the mask. In 'alpha' mode that's just the
// wash (transparent-mode alpha). In luminance modes we render the (opaque) wash
// into maskCanvas through the luminanceToAlpha filter, so bright/dark tone
// becomes alpha; invert flips which tone reveals.
function buildMaskSource(){
  if(maskMode === 'alpha') return washCanvas;
  if(maskCanvas.width !== out.width || maskCanvas.height !== out.height){
    maskCanvas.width = out.width; maskCanvas.height = out.height;
  }
  mctx.globalCompositeOperation = 'source-over';
  mctx.clearRect(0,0,maskCanvas.width,maskCanvas.height);
  if(FILTER_OK){
    // luminance → alpha. luminanceToAlpha makes BRIGHT = high alpha. We paint
    // dark ink on white paper, so by default paper(bright) would reveal; for a
    // "painted strokes reveal" feel we invert (dark ink → reveal).
    mctx.filter = 'url(#lumToAlpha)';
    mctx.drawImage(washCanvas, 0, 0, maskCanvas.width, maskCanvas.height);
    mctx.filter = 'none';
    // invert/scale through a pixel pass: 'luminance' = dark ink reveals,
    // 'luminance-invert' = bright reveals.
    const img = mctx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
    const d = img.data;
    const invert = (maskMode === 'luminance');     // dark reveals
    for(let i=3;i<d.length;i+=4){ let a=d[i]; if(invert) a=255-a; d[i]=a; }
    mctx.putImageData(img,0,0);
  } else {
    // fallback: manual luminance from wash pixels
    mctx.drawImage(washCanvas, 0, 0, maskCanvas.width, maskCanvas.height);
    const img = mctx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
    const d = img.data; const invert = (maskMode === 'luminance');
    for(let i=0;i<d.length;i+=4){
      let lum = 0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2];
      if(invert) lum = 255-lum;
      d[i+3] = lum;
    }
    mctx.putImageData(img,0,0);
  }
  return maskCanvas;
}

// ── compose: either reveal content through the wash (mask), or show the raw wash ──
function compose(){
  if(!washCanvas) return;
  octx.globalCompositeOperation = 'source-over';
  octx.clearRect(0,0,out.width,out.height);

  if(showWash){
    // Inspect the wash itself: lay a paper-toned ground, then draw the wash
    // canvas straight on top — no masking. This is exactly what the wash looks
    // like as a standalone watercolor (with a visible pigment palette).
    octx.fillStyle = '#f3eee1';
    octx.fillRect(0,0,out.width,out.height);
    octx.drawImage(washCanvas, 0, 0, out.width, out.height);
    return;
  }

  // Masked reveal: content first, then keep it only where the mask has alpha.
  octx.drawImage(contentCanvas, 0, 0, out.width, out.height);
  const maskSrc = buildMaskSource();
  // destination-in keeps content only where the mask source has alpha. In alpha
  // mode that's the painted footprint; in luminance modes it's tonal — pigment
  // thickness becomes a smooth reveal gradient.
  octx.globalCompositeOperation = 'destination-in';
  octx.drawImage(maskSrc, 0, 0, out.width, out.height);
  octx.globalCompositeOperation = 'source-over';
}

// ── painting ──
const cx = px => px / W;        // stage px → normalized
const cy = py => py / H;
function paintAt(px, py, strength){
  if(!wc) return;
  safe(()=>wc.paintNorm(cx(px), cy(py), 0.05, (Math.random()*3)|0, strength==null?0.6:strength));
}

let pointerDown = false, lastPt = null;
function onMove(px, py){
  stage.classList.add('touched');
  lastPaint = performance.now();
  // interpolate between samples so fast moves stay continuous
  if(lastPt){
    const dx=px-lastPt.x, dy=py-lastPt.y, dist=Math.hypot(dx,dy), steps=Math.max(1,(dist/6)|0);
    for(let i=1;i<=steps;i++) paintAt(lastPt.x+dx*i/steps, lastPt.y+dy*i/steps, 0.5);
  } else paintAt(px,py,0.6);
  lastPt = {x:px,y:py};
}
stage.addEventListener('pointerdown', e=>{ pointerDown=true; lastPt=null; onMove(e.offsetX,e.offsetY); });
stage.addEventListener('pointermove', e=>{ if(e.pressure>0||pointerDown||e.buttons) onMove(e.offsetX,e.offsetY); else { lastPaint=performance.now(); onMove(e.offsetX,e.offsetY); } });
addEventListener('pointerup', ()=>{ pointerDown=false; lastPt=null; safe(()=>wc.penUp&&wc.penUp()); });

// ── idle auto-demo: a wandering stroke develops the image when you're away ──
let autoT = 0, autoPhase = Math.random()*1000;
function autoPaint(now){
  if(!autoOn) return;
  if(now - lastPaint < 1800) return;      // only when idle ~2s
  autoT += 0.016;
  // a lissajous wander that sweeps the field
  const nx = 0.5 + 0.36*Math.sin(autoT*0.7 + autoPhase);
  const ny = 0.5 + 0.30*Math.sin(autoT*1.1 + autoPhase*1.3);
  safe(()=>wc.paintNorm(nx, ny, 0.055, (Math.random()*3)|0, 0.5));
  // occasionally clear so it keeps "re-developing" rather than saturating
  if(Math.random()<0.004) softClear();
}

function softClear(){ safe(()=> wc.clearPaint ? wc.clearPaint() : null); }

// ── controls ──
const autoBtn = document.getElementById('auto');
autoBtn.addEventListener('click', ()=>{ autoOn=!autoOn; autoBtn.setAttribute('aria-pressed',autoOn?'true':'false'); });
const washBtn = document.getElementById('showwash');
washBtn.addEventListener('click', ()=>{
  showWash = !showWash;
  washBtn.setAttribute('aria-pressed', showWash?'true':'false');
  // when showing: visible wash palette. when hiding: restore the palette the
  // current mask mode needs (white for alpha, dark/tonal for luminance).
  const restore = (maskMode === 'alpha') ? MASK_PALETTE : LUM_PALETTE;
  safe(()=> wc.palette && wc.palette(showWash ? WASH_PALETTE : restore));
  document.getElementById('prompt-text').textContent = showWash
    ? 'This is the raw wash — its ' + (maskMode==='alpha'?'alpha':'luminance') + ' is what masks the image'
    : 'Paint with your cursor to develop the image  ·  or watch it paint itself';
});
document.getElementById('content').addEventListener('click', ()=>{ hue=(hue+90)%360; });
document.getElementById('clear').addEventListener('click', ()=> softClear());

// mask-mode cycle: alpha → luminance (dark reveals) → luminance-invert (light reveals)
const maskBtn = document.getElementById('maskmode');
const MODE_ORDER = ['alpha','luminance','luminance-invert'];
const MODE_LABEL = { 'alpha':'Mask: alpha', 'luminance':'Mask: luminance', 'luminance-invert':'Mask: lum-invert' };
function applyMaskMode(){
  maskBtn.textContent = MODE_LABEL[maskMode];
  if(maskMode === 'alpha'){
    // transparent wash, invisible (white) pigment — alpha is the mask
    safe(()=> wc.transparent(true));
    if(!showWash) safe(()=> wc.palette(MASK_PALETTE));
  } else {
    // opaque wash, dark tonal pigment — luminance is the mask
    safe(()=> wc.transparent(false));
    if(!showWash) safe(()=> wc.palette(LUM_PALETTE));
  }
}
maskBtn.addEventListener('click', ()=>{
  maskMode = MODE_ORDER[(MODE_ORDER.indexOf(maskMode)+1) % MODE_ORDER.length];
  applyMaskMode();
});

const status = document.getElementById('status');

// ── init ──
function init(){
  sizeAll(); buildGrain();
  wc = Washes.compat1(Washes.create(sim, { gpu:false, pointer:false, transparent:true,
                            paperColor:{r:1,g:1,b:1} }));  // white paper → neutral mask alpha; compat1 = v1-surface pin
  G = wc.state();
  washCanvas = wc.canvas || (wc.el && wc.el('canvas')) || sim.querySelector('canvas');
  safe(()=> wc.transparent(true));
  safe(()=> wc.evaporation(0.55));      // strokes linger a bit so the reveal persists
  safe(()=> wc.flow(0.14));
  safe(()=> wc.quality('auto'));
  // vivid palette for the mask — alpha is what matters, but saturated pigment
  // gives crisper alpha coverage
  safe(()=> wc.palette && wc.palette([{color:'#ffffff'},{color:'#dddddd'},{color:'#bbbbbb'}]));

  let t0 = performance.now();
  function loop(now){
    drawContent(now);
    autoPaint(now);
    compose();
    status.textContent = (performance.now()-lastPaint < 1800) ? 'painting' : (autoOn ? 'auto demo' : 'idle');
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  addEventListener('resize', ()=> safe(()=>{ DPR=Math.min(2,window.devicePixelRatio||1); sizeAll(); G=wc.state(); }), {passive:true});
}
(function wait(){ if(stage.clientWidth>4 && stage.clientHeight>4) init(); else requestAnimationFrame(wait); })();
</script>
</body></html>
