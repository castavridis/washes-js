name: CI

on:
  push:
    branches: [main, "engine-review-*"]
  pull_request:

jobs:
  engine-tests:
    name: engine tests (headless CPU)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: regression harness (asserting, seeded, incl. equivalence goldens)
        run: node tests/washes-test-harness.cjs src/washes.js all
      - name: texture parity (CPU deposit math)
        run: node tests/texture-parity.test.mjs
      - name: API surface (d.ts ↔ runtime reflection)
        run: node tests/api-surface.test.mjs
      - name: GPU dual-copy drift guard (shader sync)
        run: node tests/gpu-sync.test.cjs
      - name: GPU single-sourcing (embedded block regenerates byte-identical)
        run: node scripts/sync-gpu.cjs --check
      - name: parts assembly (src/parts fragments match washes.js)
        run: node scripts/assemble.cjs --check
      - name: bare-Node headless (no DOM shim)
        run: node tests/headless-bare.test.mjs
      - name: sim-core standalone (direct module import, no host)
        run: node tests/sim-core-standalone.test.mjs
      - name: worker backend (bit-exact parity vs in-process core)
        run: node tests/worker-backend.test.mjs
      - name: save/load state (bit-exact painting round-trip)
        run: node tests/save-load.test.mjs
      - name: seeded determinism (create({seed}) replays bit-exact)
        run: node tests/seed.test.mjs
      - name: unified events (on()/once() + DOM mirrors)
        run: node tests/events.test.mjs
      - name: npm pack sanity (tarball assembles with declared files)
        run: npm pack --dry-run
      - name: standalone build (classic-script parse + global attach)
        run: node scripts/build-standalone.cjs
      - name: types (tsc --strict on declarations + smoke)
        run: |
          npm install --no-save typescript@5
          npx tsc --noEmit --strict tests/types-smoke.ts

  gpu-browser:
    name: browser smoke (WebGL, advisory)
    runs-on: ubuntu-latest
    # Advisory until the GPU render path is validated (see engine
    # CHANGELOG 1.0.1 "known parity item" and ENGINE_REVIEW P0#4);
    # flip to required once it has been green for a while.
    continue-on-error: true
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-standalone.cjs
      - run: npm install --no-save @playwright/test@1
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
